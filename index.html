<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mevzuat Kütüphanesi</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide İkonları -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .resizing { user-select: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pdf-page-wrap {
            position: relative;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            border-radius: 8px;
            overflow: hidden;
            --scale-factor: 1;
        }
        .pdf-canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .pdf-text-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: 1;
            line-height: 1;
            transform-origin: 0 0;
            pointer-events: none;
            --scale-factor: 1;
        }
        .pdf-text-layer span,
        .pdf-text-layer br {
            color: transparent;
            position: absolute;
            white-space: pre;
            transform-origin: 0% 0%;
            cursor: text;
        }
        .pdf-text-layer ::selection {
            background: rgba(59, 130, 246, 0.35);
        }
        .pdf-search-hit {
            outline: 2px solid rgba(202, 138, 4, 0.95);
            background: rgba(250, 204, 21, 0.35) !important;
            border-radius: 3px;
        }
        .pdf-search-hit-active {
            outline: 3px solid rgba(234, 88, 12, 0.95);
            background: rgba(249, 115, 22, 0.45) !important;
        }

        /* Yıl filtresi dropdown stili için ok simgesi kaldırma */
        .select-arrow-none {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-full overflow-hidden flex relative">

    <div id="globalLoader" class="hidden fixed inset-0 bg-slate-900/60 z-50 items-center justify-center backdrop-blur-sm">
        <div class="bg-white px-8 py-6 rounded-2xl shadow-2xl flex flex-col items-center">
            <div class="loader mb-4 border-[3px] border-slate-200 border-t-blue-600 w-10 h-10"></div>
            <p id="globalLoaderText" class="text-slate-700 font-semibold text-center">İşlem yapılıyor...</p>
            <p class="text-slate-400 text-xs mt-2">Lütfen bekleyin</p>
        </div>
    </div>

    <input type="file" id="uploadInput" accept="application/pdf" class="hidden">
    <input type="file" id="replaceInput" accept="application/pdf" class="hidden">

    <div id="sidebar" class="w-full md:w-[320px] shrink-0 bg-white flex flex-col relative z-20">
        <div class="p-5 bg-blue-700 text-white shadow-md z-10 shrink-0">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                    <div class="flex items-center gap-3">
                        <i data-lucide="book-open" class="text-blue-200 w-7 h-7"></i>
                        <h1 id="mevzuatTitle" class="text-xl font-bold tracking-wide flex items-center gap-2 cursor-pointer select-none" title="Yönetici girişi için 3 kez tıklayın">
                            Mevzuat
                            <span id="adminIndicator" class="hidden text-emerald-300" title="Yönetici Modu Aktif"><i data-lucide="unlock" class="w-4 h-4"></i></span>
                        </h1>
                    </div>
                    <p class="text-[11px] text-blue-200 mt-1.5 font-medium opacity-80">© Gökhan ELGÜL tarafından tasarlanmıştır.</p>
                </div>
                <button id="addNewBtn" class="hidden p-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors text-white shrink-0 shadow-sm" title="Yeni Belge Yükle">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="Ara..." class="w-full pl-9 pr-3 py-2.5 bg-blue-800/50 border border-blue-600 rounded-lg text-white placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-blue-800 transition-colors text-sm">
                    <i data-lucide="search" class="absolute left-3 top-3 text-blue-300 w-4 h-4"></i>
                </div>
                <div class="relative w-28 shrink-0">
                    <select id="yearFilter" class="w-full h-full bg-blue-800/50 border border-blue-600 rounded-lg text-white text-sm pl-3 pr-8 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-blue-800 transition-colors cursor-pointer select-arrow-none">
                        <option value="all">Tümü</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-2 top-3 text-blue-300 w-4 h-4 pointer-events-none"></i>
                </div>
            </div>
        </div>

        <div id="docList" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

        <div id="listFooter" class="p-3 border-t border-slate-200 bg-slate-50 text-xs text-slate-500 text-center font-medium shrink-0">
            Yükleniyor...
        </div>
    </div>

    <div id="resizer" class="hidden md:block w-1.5 bg-slate-200 hover:bg-blue-400 cursor-col-resize transition-colors z-30 shrink-0"></div>

    <div id="mainPanel" class="flex-1 hidden md:flex flex-col bg-slate-100 relative min-w-0">
        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 text-center bg-slate-50/50">
            <div class="w-24 h-24 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center mb-6">
                <i data-lucide="file-text" class="text-blue-200 w-12 h-12"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-700 mb-2">Dokümanları Güvenle Açın</h2>
            <p class="max-w-md text-slate-500 mb-6 px-4">Sol menüden incelemek istediğiniz mevzuatı seçerek görüntüleyebilirsiniz.</p>
        </div>

        <div id="viewerState" class="hidden flex-1 flex-col w-full h-full relative bg-slate-600">
            <div class="absolute top-3 sm:top-4 left-1/2 -translate-x-1/2 z-30 flex items-center glass-panel border border-slate-200/60 rounded-xl p-1.5 gap-1.5 transition-all w-[96%] sm:w-auto max-w-full overflow-x-auto no-scrollbar">
                <button id="backBtn" class="md:hidden flex items-center justify-center p-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg shrink-0 transition-colors" title="Listeye Dön">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>

                <div class="hidden sm:flex items-center px-2 shrink-0 max-w-[200px] lg:max-w-[350px]">
                    <i data-lucide="file-check" class="w-4 h-4 text-blue-600 mr-1.5 shrink-0"></i>
                    <span id="viewerTitle" class="text-sm font-bold text-slate-700 truncate"></span>
                </div>

                <div class="hidden sm:block w-px h-5 bg-slate-300 mx-1 shrink-0"></div>

                <div class="flex items-center bg-white rounded-lg px-2 shadow-sm border border-slate-200 shrink-0">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400 shrink-0"></i>
                    <input type="text" id="pdfInnerSearch" placeholder="PDF'te Bul..." class="w-24 sm:w-36 bg-transparent text-sm py-1.5 px-2 focus:outline-none text-slate-700 placeholder-slate-400">
                    <button id="pdfSearchBtn" class="text-blue-600 font-semibold px-1.5 py-1 hover:text-blue-800 text-sm shrink-0 transition-colors">Bul</button>
                    <button id="pdfClearSearchBtn" class="hidden text-slate-500 font-semibold px-1.5 py-1 hover:text-red-600 text-sm shrink-0 transition-colors" title="Aramayı temizle">×</button>
                </div>

                <div id="adminTools" class="hidden items-center gap-1 shrink-0 ml-1">
                    <div class="w-px h-5 bg-slate-300 mx-0.5 shrink-0"></div>
                    <button id="replaceBtn" class="p-1.5 text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors shrink-0" title="Bu belgeyi yenisiyle değiştir">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <button id="deleteBtn" class="p-1.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors shrink-0" title="Bu belgeyi sil">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="w-px h-5 bg-slate-300 mx-0.5 shrink-0"></div>

                <a id="fullScreenBtn" target="_blank" class="flex items-center justify-center p-1.5 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors shrink-0" title="PDF'i yeni sekmede aç">
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                </a>
                <a id="downloadBtn" target="_blank" class="flex items-center justify-center p-1.5 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors shrink-0" title="PDF'i İndir">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </a>
            </div>

            <div id="loader" class="hidden absolute inset-0 m-auto flex-col items-center justify-center z-10 bg-white/70 backdrop-blur-sm">
                <div class="loader mb-2 border-t-blue-600"></div>
                <p class="text-sm font-bold text-blue-800">PDF Bağlantısı Kuruluyor...</p>
            </div>

            <div id="errorState" class="hidden absolute inset-0 m-auto flex-col items-center justify-center text-red-500 p-6 text-center z-10">
                <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-sm border border-red-100">
                    <i data-lucide="alert-circle" class="mb-4 text-red-500 w-12 h-12"></i>
                    <h3 class="font-bold text-lg mb-2 text-slate-800">Bağlantı Başarısız</h3>
                    <p id="errorText" class="text-sm text-red-600">Hata detayı</p>
                </div>
            </div>

            <div id="pdfViewerContainer" class="flex-1 w-full h-full overflow-auto relative bg-slate-700 pt-20 pb-8 px-2 sm:px-6">
                <div id="pdfPages" class="mx-auto flex flex-col items-center gap-5"></div>
            </div>
        </div>
    </div>

    <!-- PDF.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getStorage, ref, getDownloadURL, listAll, deleteObject, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxq8AI16Y1jNuJMLES8NNEqKlGg2Ul4JI",
            authDomain: "mevzuat-f0699.firebaseapp.com",
            databaseURL: "https://mevzuat-f0699-default-rtdb.firebaseio.com",
            projectId: "mevzuat-f0699",
            storageBucket: "mevzuat-f0699.firebasestorage.app",
            messagingSenderId: "960929396368",
            appId: "1:960929396368:web:2faa0cbfc5cf4e3dd34a15"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        let allDocs = [];
        let selectedDoc = null;
        let isAdmin = false;
        let currentPdfUrl = '';
        let pdfDoc = null;
        let pdfSearchMatches = [];
        let activeSearchIndex = -1;
        let currentRenderTask = null;
        const klasorYolu = 'mevzuat';

        const els = {
            sidebar: document.getElementById('sidebar'),
            resizer: document.getElementById('resizer'),
            mainPanel: document.getElementById('mainPanel'),
            docList: document.getElementById('docList'),
            listFooter: document.getElementById('listFooter'),
            searchInput: document.getElementById('searchInput'),
            yearFilter: document.getElementById('yearFilter'),
            mevzuatTitle: document.getElementById('mevzuatTitle'),
            adminIndicator: document.getElementById('adminIndicator'),
            addNewBtn: document.getElementById('addNewBtn'),
            uploadInput: document.getElementById('uploadInput'),
            replaceBtn: document.getElementById('replaceBtn'),
            replaceInput: document.getElementById('replaceInput'),
            deleteBtn: document.getElementById('deleteBtn'),
            adminTools: document.getElementById('adminTools'),
            emptyState: document.getElementById('emptyState'),
            viewerState: document.getElementById('viewerState'),
            viewerTitle: document.getElementById('viewerTitle'),
            backBtn: document.getElementById('backBtn'),
            fullScreenBtn: document.getElementById('fullScreenBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            errorState: document.getElementById('errorState'),
            errorText: document.getElementById('errorText'),
            pdfViewerContainer: document.getElementById('pdfViewerContainer'),
            pdfPages: document.getElementById('pdfPages'),
            loader: document.getElementById('loader'),
            pdfInnerSearch: document.getElementById('pdfInnerSearch'),
            pdfSearchBtn: document.getElementById('pdfSearchBtn'),
            pdfClearSearchBtn: document.getElementById('pdfClearSearchBtn'),
            globalLoader: document.getElementById('globalLoader'),
            globalLoaderText: document.getElementById('globalLoaderText')
        };

        lucide.createIcons();

        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        function normalizeText(text) {
            return String(text || '')
                .toLocaleLowerCase('tr-TR')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function cleanTitle(filename) {
            let title = filename.replace(/\.pdf$/i, '');
            title = title.replace(/^\d{10,}[_\-\s]*/, '');
            title = title.replace(/_/g, ' ');
            return title.trim() || filename.replace(/\.pdf$/i, '');
        }

        function extractYear(filename) {
            const yearMatch = filename.match(/(20\d{2})/);
            return yearMatch ? yearMatch[1] : 'Genel';
        }

        function updateAdminUI() {
            if (isAdmin) {
                els.adminIndicator.classList.remove('hidden');
                els.addNewBtn.classList.remove('hidden');
                if (selectedDoc) {
                    els.adminTools.classList.remove('hidden');
                    els.adminTools.classList.add('flex');
                }
            } else {
                els.adminIndicator.classList.add('hidden');
                els.addNewBtn.classList.add('hidden');
                els.adminTools.classList.add('hidden');
                els.adminTools.classList.remove('flex');
            }
            lucide.createIcons();
        }

        let secretClickCount = 0;
        let secretClickTimer;

        els.mevzuatTitle.addEventListener('click', () => {
            secretClickCount++;
            clearTimeout(secretClickTimer);

            if (secretClickCount === 3) {
                secretClickCount = 0;
                if (isAdmin) {
                    isAdmin = false;
                    updateAdminUI();
                    return;
                }
                const pwd = prompt('Yönetici Şifresini Giriniz:');
                if (pwd === '5034') {
                    isAdmin = true;
                    updateAdminUI();
                } else if (pwd !== null) {
                    alert('Hatalı şifre!');
                }
            } else {
                secretClickTimer = setTimeout(() => { secretClickCount = 0; }, 1000);
            }
        });

        let isResizing = false;
        els.resizer.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.classList.add('resizing');
            document.body.style.cursor = 'col-resize';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;
            if (newWidth < 250) newWidth = 250;
            if (newWidth > window.innerWidth / 1.5) newWidth = window.innerWidth / 1.5;
            els.sidebar.style.width = newWidth + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.classList.remove('resizing');
                document.body.style.cursor = 'default';
            }
        });

        function populateYearFilter() {
            const currentSelection = els.yearFilter.value;
            const uniqueYears = [...new Set(allDocs.map(d => d.year))].filter(y => y !== 'Genel').sort((a, b) => b.localeCompare(a));
            
            let optionsHtml = '<option value="all">Tümü</option>';
            uniqueYears.forEach(year => {
                optionsHtml += `<option value="${year}">${year}</option>`;
            });
            
            if (allDocs.some(d => d.year === 'Genel')) {
                optionsHtml += '<option value="Genel">Genel</option>';
            }
            
            els.yearFilter.innerHTML = optionsHtml;
            
            if ([...els.yearFilter.options].some(opt => opt.value === currentSelection)) {
                els.yearFilter.value = currentSelection;
            }
        }

        window.renderList = function() {
            const query = els.searchInput.value.toLocaleLowerCase('tr-TR');
            const selectedYear = els.yearFilter.value;

            const filtered = allDocs.filter(doc => {
                const matchesQuery = doc.cleanName.toLocaleLowerCase('tr-TR').includes(query) || doc.year.toLocaleLowerCase('tr-TR').includes(query);
                const matchesYear = selectedYear === 'all' || doc.year === selectedYear;
                return matchesQuery && matchesYear;
            });

            els.listFooter.innerText = `Toplam ${filtered.length} belge`;

            if (filtered.length === 0) {
                els.docList.innerHTML = `
                    <div class="text-center py-12 text-slate-500">
                        <i data-lucide="search" class="mx-auto mb-3 text-slate-300 w-8 h-8"></i>
                        <p class="text-sm">Kayıt bulunamadı.</p>
                    </div>`;
            } else {
                els.docList.innerHTML = filtered.map(doc => `
                    <button onclick="selectDoc('${doc.id}')" class="w-full text-left p-3 rounded-xl border transition-all duration-200 group flex items-start gap-3 ${selectedDoc?.id === doc.id ? 'bg-blue-50 border-blue-400 shadow-sm ring-1 ring-blue-400' : 'bg-white border-slate-200 hover:border-blue-300 hover:bg-slate-50 hover:shadow-sm'}">
                        <div class="p-2 rounded-lg mt-0.5 shrink-0 ${selectedDoc?.id === doc.id ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600'}">
                            <i data-lucide="file-text" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-medium text-sm sm:text-[15px] leading-snug truncate ${selectedDoc?.id === doc.id ? 'text-blue-800' : 'text-slate-700 group-hover:text-blue-700'}">${doc.cleanName}</h3>
                            <div class="flex items-center gap-1.5 mt-1.5 text-[11px] font-medium">
                                <span class="px-1.5 py-0.5 rounded border border-slate-200 bg-slate-100 text-slate-600 flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3 opacity-70"></i> ${doc.year}
                                </span>
                            </div>
                        </div>
                    </button>
                `).join('');
            }
            lucide.createIcons();
        };

        async function fetchFromFirebase() {
            try {
                els.docList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-blue-500">
                        <div class="loader mb-3 border-t-blue-500"></div>
                        <p class="text-sm font-medium">Dosyalar alınıyor...</p>
                    </div>`;

                const listRef = ref(storage, klasorYolu);
                const res = await listAll(listRef);

                if (res.items.length === 0) {
                    els.docList.innerHTML = '<div class="p-4 text-amber-600 bg-amber-50 text-sm rounded-lg border border-amber-200">Klasörde hiç PDF bulunamadı.</div>';
                    els.listFooter.innerText = '0 Belge';
                    return;
                }

                allDocs = res.items
                    .filter(item => item.name.toLowerCase().endsWith('.pdf'))
                    .map((item, index) => ({
                        id: `firebase-${item.name}-${index}`,
                        originalName: item.name,
                        cleanName: cleanTitle(item.name),
                        year: extractYear(item.name),
                        fullPath: item.fullPath
                    }));

                allDocs.sort((a, b) => a.cleanName.localeCompare(b.cleanName, 'tr-TR'));
                
                populateYearFilter();
                renderList();
            } catch (error) {
                els.docList.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-center text-sm">
                        <i data-lucide="alert-circle" class="mx-auto mb-2 text-red-500 w-6 h-6"></i>
                        <p class="font-semibold mb-1">Liste Hatası</p>
                        <p>${error.message}</p>
                    </div>`;
                lucide.createIcons();
            }
        }

        window.selectDoc = async function(id) {
            selectedDoc = allDocs.find(d => d.id === id);
            if (!selectedDoc) return;

            resetDeleteBtn();
            updateAdminUI();
            els.pdfInnerSearch.value = '';
            renderList();

            els.sidebar.classList.remove('flex');
            els.sidebar.classList.add('hidden', 'md:flex');
            els.mainPanel.classList.remove('hidden');
            els.mainPanel.classList.add('flex');
            els.emptyState.classList.add('hidden');
            els.viewerState.classList.remove('hidden');
            els.viewerState.classList.add('flex');
            els.viewerTitle.innerText = selectedDoc.cleanName;
            els.viewerTitle.title = selectedDoc.cleanName;

            els.pdfPages.innerHTML = '';
            els.errorState.classList.add('hidden');
            els.loader.classList.remove('hidden');
            els.loader.classList.add('flex');

            try {
                const fileRef = ref(storage, selectedDoc.fullPath);
                currentPdfUrl = await getDownloadURL(fileRef);

                els.fullScreenBtn.href = currentPdfUrl;
                els.downloadBtn.href = currentPdfUrl;
                els.downloadBtn.download = selectedDoc.cleanName + '.pdf';

                await renderPdfWithTextLayer(currentPdfUrl);
            } catch (err) {
                els.errorText.innerText = err.message || String(err);
                els.errorState.classList.remove('hidden');
                els.errorState.classList.add('flex');
            } finally {
                els.loader.classList.add('hidden');
                els.loader.classList.remove('flex');
            }
        };

        async function renderPdfWithTextLayer(url) {
            if (!window.pdfjsLib) {
                throw new Error('PDF.js yüklenemedi. İnternet bağlantısı veya kurum güvenlik duvarı CDN erişimini engelliyor olabilir.');
            }

            if (currentRenderTask) {
                try { currentRenderTask.cancel(); } catch (e) {}
                currentRenderTask = null;
            }

            pdfSearchMatches = [];
            activeSearchIndex = -1;
            pdfDoc = null;
            els.pdfPages.innerHTML = '';
            els.pdfClearSearchBtn.classList.add('hidden');
            els.pdfViewerContainer.scrollTop = 0;

            const loadingTask = pdfjsLib.getDocument({
                url,
                cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                cMapPacked: true
            });

            pdfDoc = await loadingTask.promise;
            const containerWidth = Math.max(320, els.pdfViewerContainer.clientWidth - 36);

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const baseViewport = page.getViewport({ scale: 1 });
                const scale = Math.min(1.7, containerWidth / baseViewport.width);
                const viewport = page.getViewport({ scale });

                const pageWrap = document.createElement('div');
                pageWrap.className = 'pdf-page-wrap';
                pageWrap.dataset.pageNumber = String(pageNum);
                pageWrap.style.width = `${viewport.width}px`;
                pageWrap.style.height = `${viewport.height}px`;
                pageWrap.style.maxWidth = '100%';
                pageWrap.style.setProperty('--scale-factor', String(viewport.scale));

                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-canvas';
                const context = canvas.getContext('2d', { alpha: false });
                const outputScale = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = `${viewport.width}px`;
                canvas.style.height = `${viewport.height}px`;
                context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

                const textLayer = document.createElement('div');
                textLayer.className = 'pdf-text-layer';
                textLayer.dataset.pageNumber = String(pageNum);
                textLayer.style.width = `${viewport.width}px`;
                textLayer.style.height = `${viewport.height}px`;
                textLayer.style.setProperty('--scale-factor', String(viewport.scale));

                pageWrap.appendChild(canvas);
                pageWrap.appendChild(textLayer);
                els.pdfPages.appendChild(pageWrap);

                currentRenderTask = page.render({ canvasContext: context, viewport });
                await currentRenderTask.promise;

                const textContent = await page.getTextContent();
                await pdfjsLib.renderTextLayer({
                    textContentSource: textContent,
                    container: textLayer,
                    viewport,
                    textDivs: []
                }).promise;

                Array.from(textLayer.querySelectorAll('span')).forEach(span => {
                    span.dataset.searchText = span.textContent || '';
                    span.title = span.textContent || '';
                });
            }

            currentRenderTask = null;
        }

        function clearSearchHighlights() {
            els.pdfPages.querySelectorAll('.pdf-search-hit, .pdf-search-hit-active').forEach(el => {
                el.classList.remove('pdf-search-hit', 'pdf-search-hit-active');
            });
            pdfSearchMatches = [];
            activeSearchIndex = -1;
        }

        function findMatchesInTextLayer(keyword) {
            const keywordNorm = normalizeText(keyword);
            const spans = Array.from(els.pdfPages.querySelectorAll('.pdf-text-layer span'));
            const matches = [];

            spans.forEach(span => {
                const text = span.dataset.searchText || span.textContent || '';
                if (normalizeText(text).includes(keywordNorm)) {
                    span.classList.add('pdf-search-hit');
                    matches.push({ el: span, page: span.closest('.pdf-text-layer')?.dataset.pageNumber || '' });
                }
            });

            return matches;
        }

        function activateSearchResult(index) {
            if (!pdfSearchMatches.length) return;

            pdfSearchMatches.forEach(item => item.el.classList.remove('pdf-search-hit-active'));
            activeSearchIndex = ((index % pdfSearchMatches.length) + pdfSearchMatches.length) % pdfSearchMatches.length;
            const active = pdfSearchMatches[activeSearchIndex];
            active.el.classList.add('pdf-search-hit-active');
            active.el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }

        function searchInsidePDF() {
            const keyword = els.pdfInnerSearch.value.trim();
            if (!currentPdfUrl || !selectedDoc || !pdfDoc) return;

            if (!keyword) {
                alert('Lütfen PDF içinde aranacak kelimeyi yazın.');
                return;
            }

            clearSearchHighlights();
            pdfSearchMatches = findMatchesInTextLayer(keyword);

            if (!pdfSearchMatches.length) {
                alert(`“${keyword}” kelimesi bu PDF içinde bulunamadı. PDF taranmış resim ise metin içermez; OCR yapılmış PDF yüklenmelidir.`);
                return;
            }

            els.pdfClearSearchBtn.classList.remove('hidden');
            activateSearchResult(0);
        }

        function clearPdfSearch() {
            els.pdfInnerSearch.value = '';
            els.pdfClearSearchBtn.classList.add('hidden');
            clearSearchHighlights();
        }

        els.pdfSearchBtn.addEventListener('click', () => {
            if (pdfSearchMatches.length && els.pdfInnerSearch.value.trim()) {
                activateSearchResult(activeSearchIndex + 1);
            } else {
                searchInsidePDF();
            }
        });
        els.pdfClearSearchBtn.addEventListener('click', clearPdfSearch);
        els.pdfInnerSearch.addEventListener('input', () => {
            clearSearchHighlights();
            els.pdfClearSearchBtn.classList.add('hidden');
        });
        els.pdfInnerSearch.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (pdfSearchMatches.length) activateSearchResult(activeSearchIndex + 1);
                else searchInsidePDF();
            }
        });

        async function handleUpload(file, oldDocToReplace = null) {
            try {
                els.globalLoaderText.innerText = oldDocToReplace ? 'Dosya değiştiriliyor...' : 'Yeni belge yükleniyor...';
                els.globalLoader.classList.remove('hidden');
                els.globalLoader.classList.add('flex');

                const cleanName = cleanTitle(file.name);
                const finalFilename = cleanName + '.pdf';
                const finalPath = `${klasorYolu}/${finalFilename}`;
                const fileRef = ref(storage, finalPath);

                if (oldDocToReplace && oldDocToReplace.fullPath !== finalPath) {
                    const oldRef = ref(storage, oldDocToReplace.fullPath);
                    await deleteObject(oldRef).catch(e => console.warn(e));
                    allDocs = allDocs.filter(d => d.id !== oldDocToReplace.id);
                } else if (oldDocToReplace) {
                    allDocs = allDocs.filter(d => d.id !== oldDocToReplace.id);
                }

                await uploadBytes(fileRef, file);

                const newDoc = {
                    id: `firebase-${Date.now()}`,
                    originalName: finalFilename,
                    cleanName,
                    year: extractYear(file.name),
                    fullPath: finalPath
                };

                allDocs = allDocs.filter(d => d.fullPath !== finalPath);
                allDocs.unshift(newDoc);
                allDocs.sort((a, b) => a.cleanName.localeCompare(b.cleanName, 'tr-TR'));

                populateYearFilter();
                renderList();
                window.selectDoc(newDoc.id);
            } catch(e) {
                alert('İşlem Hatası: ' + e.message);
            } finally {
                els.globalLoader.classList.add('hidden');
                els.globalLoader.classList.remove('flex');
            }
        }

        els.addNewBtn.addEventListener('click', () => els.uploadInput.click());
        els.uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleUpload(file);
            e.target.value = '';
        });

        els.replaceBtn.addEventListener('click', () => els.replaceInput.click());
        els.replaceInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && selectedDoc) handleUpload(file, selectedDoc);
            e.target.value = '';
        });

        let deleteConfirmTimeout;
        function resetDeleteBtn() {
            els.deleteBtn.classList.remove('confirm-mode', 'bg-red-600', 'text-white');
            els.deleteBtn.classList.add('bg-red-50', 'text-red-600');
            els.deleteBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
            lucide.createIcons();
        }

        els.deleteBtn.addEventListener('click', async () => {
            if (!selectedDoc) return;
            if (!els.deleteBtn.classList.contains('confirm-mode')) {
                els.deleteBtn.classList.add('confirm-mode', 'bg-red-600', 'text-white');
                els.deleteBtn.classList.remove('bg-red-50', 'text-red-600');
                els.deleteBtn.innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4"></i>';
                lucide.createIcons();
                deleteConfirmTimeout = setTimeout(() => { resetDeleteBtn(); }, 3000);
                return;
            }

            clearTimeout(deleteConfirmTimeout);
            resetDeleteBtn();

            try {
                els.globalLoaderText.innerText = 'Belge siliniyor...';
                els.globalLoader.classList.remove('hidden');
                els.globalLoader.classList.add('flex');

                const fileRef = ref(storage, selectedDoc.fullPath);
                await deleteObject(fileRef);

                allDocs = allDocs.filter(d => d.id !== selectedDoc.id);
                selectedDoc = null;
                
                populateYearFilter();
                els.backBtn.click();
                renderList();
                updateAdminUI();
            } catch(e) {
                alert('Silme Hatası: ' + e.message);
            } finally {
                els.globalLoader.classList.add('hidden');
                els.globalLoader.classList.remove('flex');
            }
        });

        els.searchInput.addEventListener('input', renderList);
        els.yearFilter.addEventListener('change', renderList);
        
        els.backBtn.addEventListener('click', () => {
            els.sidebar.classList.add('flex');
            els.sidebar.classList.remove('hidden');
            els.mainPanel.classList.add('hidden');
            els.mainPanel.classList.remove('flex');
            selectedDoc = null;
            updateAdminUI();
            renderList();
        });

        fetchFromFirebase();
    </script>
</body>
</html>
