<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TKGM Mevzuat Sistemi</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%234f46e5'/%3E%3Cpath d='M25 75 L25 25 L75 25 L75 75 Z M25 50 L75 50 M50 25 L50 75' stroke='%23ffffff' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; color: #0f172a; margin: 0; }
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Belirginleştirilmiş Kart Tasarımı */
        .glass-card { 
            background: #ffffff; 
            border: 1px solid #cbd5e1; /* Daha belirgin kenar çizgisi */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(0,0,0,0.02); /* İçsel ve dışsal gölge */
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: #818cf8;
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(0,0,0,0.02);
        }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(8px); 
            display: none; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal.active { display: flex; animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .modal-content { 
            background: #ffffff; 
            width: 96%; height: 94%; 
            border-radius: 1.5rem; 
            display: flex; flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        #pdf-scroll-area { 
            overflow: auto; flex-grow: 1; 
            background-color: #f1f5f9; 
            display: flex; flex-direction: column; 
            align-items: center; padding: 25px 10px; 
            scroll-behavior: smooth;
        }

        .pdf-page-container { 
            position: relative; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            background: white; 
            margin-bottom: 25px;
            flex-shrink: 0;
            border-radius: 4px;
        }

        canvas { display: block; width: 100%; height: auto; }
        
        /* PDF Metin Seçimi İçin Düzenlemeler */
        .textLayer { 
            position: absolute; inset: 0; 
            opacity: 1; line-height: 1; overflow: hidden;
        }
        .textLayer span { 
            color: transparent; position: absolute; 
            white-space: pre; cursor: text; 
            transform-origin: 0% 0%; 
            pointer-events: auto; /* Metin seçimini aktif eder */
        }
        .textLayer span::selection {
            background: rgba(99, 102, 241, 0.3); /* Seçim rengi */
        }
        
        .highlight { background-color: rgba(250, 204, 21, 0.5) !important; border-radius: 2px; }
        .highlight.selected { 
            background-color: rgba(249, 115, 22, 0.8) !important;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
            outline: 2px solid #fff;
            z-index: 100;
        }

        .loader { 
            border: 3px solid rgba(79, 70, 229, 0.1); 
            border-top: 3px solid #4f46e5; 
            border-radius: 50%; width: 45px; height: 45px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: #1e293b; color: white; padding: 0.8rem 1.6rem; 
            border-radius: 1rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; 
            font-size: 0.85rem; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body class="h-full">
    <canvas id="dynamic-bg"></canvas>

    <div id="main-loader-container" class="fixed inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-[9999]">

    <div id="app-container" class="h-full flex flex-col" style="display: none;">

                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="refresh-data-btn" class="p-2.5 glass-card rounded-xl text-slate-500 hover:text-emerald-600 transition-colors" title="Verileri Yenile">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
                </button>

        </nav>

        <main class="flex-grow flex flex-col items-center justify-center px-6 pb-24">
            <div class="text-center mb-10 fade-in">
                <h1 class="text-4xl sm:text-6xl font-black tracking-tight mb-2 uppercase leading-none text-slate-800">TKGM MEVZUAT</h1>
                <p class="text-indigo-600/70 text-[9px] sm:text-[11px] font-bold tracking-[0.4em] uppercase">Gökhan ELGÜL tarafından tasarlanmıştır</p>
            </div>

            <!-- Arama Alanı (z-index yüksek ve relative) -->
            <div class="w-full max-w-2xl mb-12 fade-in relative z-[100]" style="animation-delay: 0.1s">
                <div class="relative flex items-center w-full">

                    <!-- Arama Kutusunun Kendisine İç Gölge ve Belirgin Çizgi Eklendi -->
                    <input type="text" id="search-input" placeholder="Mevzuat dökümanlarında ara..." class="w-full bg-white border border-slate-300 shadow-inner rounded-2xl py-4 pl-14 pr-12 text-sm text-slate-800 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none transition-all placeholder-slate-400 font-medium">
                    <button id="clear-search-btn" class="absolute right-4 p-1 text-slate-400 hover:text-red-500 transition-colors hidden focus:outline-none bg-white" title="Aramayı Temizle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>

                    <h2 class="text-lg font-bold text-slate-800 uppercase tracking-widest">TAPU</h2>

                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>

        </main>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-content max-w-lg !h-auto p-10">
            <h2 class="text-2xl font-black mb-8 tracking-tight uppercase text-slate-800">Toplu Döküman Ekle</h2>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">PDF DOSYALARI (Çoklu Seçim)</label>
                    <input type="file" id="file-input" accept=".pdf" multiple class="w-full bg-slate-50 border border-slate-300 shadow-inner p-4 rounded-xl text-sm text-slate-700 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">BİRİM</label>
                        <select id="section-select" class="w-full bg-slate-50 border border-slate-300 shadow-inner p-4 rounded-xl text-sm text-slate-700 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                            <option value="tapu">TAPU</option>
                            <option value="kadastro">KADASTRO</option>
                            <option value="genel">GENEL</option>

                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">TÜR</label>
                        <select id="type-select" class="w-full bg-slate-50 border border-slate-300 shadow-inner p-4 rounded-xl text-sm text-slate-700 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">

                            <option value="talimat">TALİMAT</option>

                    <button id="start-upload-btn" class="flex-1 p-4 bg-indigo-600 hover:bg-indigo-700 transition-colors rounded-xl font-black uppercase tracking-wider text-[11px] text-white shadow-lg shadow-indigo-500/30">Yükle</button>
                </div>

    <!-- Category Selection Modal -->
    <div id="selection-modal" class="modal">
        <div class="modal-content max-w-lg !h-auto max-h-[85%] p-10 bg-white">
            <h2 id="selection-title" class="text-3xl font-black uppercase mb-8 tracking-tight text-slate-800">Birim</h2>
            <div id="selection-body" class="space-y-3 pr-2 overflow-y-auto"></div>
            <button id="close-selection-btn" class="mt-8 w-full p-4 bg-white border border-slate-200 shadow-sm hover:bg-slate-50 text-slate-600 rounded-2xl font-bold uppercase text-[11px] tracking-wider transition-colors">Kapat</button>
        </div>
    </div>

    <!-- PDF Viewer Modal -->
    <div id="pdf-modal" class="modal">
        <div class="modal-content relative bg-[#f8fafc]">
            <header class="bg-white p-5 border-b border-slate-200 flex flex-col gap-4 shadow-sm z-10">
                <div class="flex items-center justify-between">
                    <h3 id="pdf-title" class="text-[13px] font-black text-slate-800 uppercase truncate max-w-[60%] tracking-wider">DÖKÜMAN</h3>
                    <div class="flex gap-3">
                        <div class="flex items-center bg-white border border-slate-200 shadow-sm rounded-xl p-1">
                            <button id="zoom-out" class="p-2 hover:text-indigo-600 text-slate-500 transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            <span id="zoom-text" class="text-[11px] font-bold min-w-[45px] flex items-center justify-center text-slate-700">100%</span>
                            <button id="zoom-in" class="p-2 hover:text-indigo-600 text-slate-500 transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        </div>
                        <button id="close-pdf-btn" class="p-3 bg-white border border-red-100 text-red-600 shadow-sm rounded-xl hover:bg-red-500 hover:text-white transition-all"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    </div>
                </div>
                <div class="flex items-center bg-white border border-slate-300 shadow-inner rounded-xl px-5 py-3 focus-within:ring-2 focus-within:ring-indigo-500/20 focus-within:border-indigo-400 transition-all">
                    <svg class="text-slate-400 mr-3" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="pdf-search-input" placeholder="Döküman içinde kelime ara..." class="bg-transparent border-none focus:ring-0 text-slate-800 w-full text-sm font-medium placeholder-slate-400">
                    <div id="pdf-search-info" class="text-[10px] font-bold text-white bg-indigo-500 px-3 py-1.5 rounded-lg ml-3 whitespace-nowrap shadow-sm">0 / 0</div>
                    <div class="flex gap-2 ml-4 border-l border-slate-200 pl-4">
                        <button id="search-prev" class="p-1.5 hover:text-indigo-600 text-slate-400 transition transform active:scale-90 bg-slate-50 rounded-md shadow-sm border border-slate-200"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button id="search-next" class="p-1.5 hover:text-indigo-600 text-slate-400 transition transform active:scale-90 bg-slate-50 rounded-md shadow-sm border border-slate-200"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
                    </div>
                </div>
            </header>
            <div id="pdf-scroll-area">
                <div id="pdf-container"></div>
                <div id="pdf-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-white/90 hidden z-50 backdrop-blur-sm">
                    <div class="loader mb-4"></div>
                    <p class="text-indigo-600 text-[11px] font-bold tracking-widest uppercase">Döküman Çözümleniyor</p>
                </div>
            </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const k1 = "AIzaSyDxq8AI";
        const k2 = "16Y1jNuJMLES8NNEqKlGg2Ul4JI";
        
        const firebaseConfig = {
            apiKey: k1 + k2,
            authDomain: "mevzuat-f0699.firebaseapp.com",
            databaseURL: "https://mevzuat-f0699-default-rtdb.firebaseio.com",
            projectId: "mevzuat-f0699",
            storageBucket: "mevzuat-f0699.firebasestorage.app",
            messagingSenderId: "960929396368",
            appId: "1:960929396368:web:2faa0cbfc5cf4e3dd34a15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mevzuat-f0699';

        let state = { data: { tapu: {}, kadastro: {}, genel: {} }, pdfDoc: null, matches: [], currentMatch: -1, scale: 1.15, isAdmin: false };

        const showToast = (m) => {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        window.deletePdf = async (id, url, event) => {
            event.stopPropagation();
            if (!confirm("Bu dökümanı kalıcı olarak silmek istediğinize emin misiniz?")) return;
            
            try {
                if (!id) return showToast("Bu döküman silinemez.");
                
                await deleteDoc(doc(db, `artifacts/${appId}/public/data/mevzuat`, id));
                const fileRef = ref(storage, url);
                await deleteObject(fileRef).catch(e => console.warn("Storage silme hatası", e));
                
                showToast("Döküman silindi.");
                
                loadAppData();
                const activeSection = document.getElementById('selection-modal').classList.contains('active');
                if(!activeSection) document.getElementById('selection-modal').classList.remove('active');
            } catch(e) {
                showToast("Silinemedi!");
                console.error(e);
            }
        };

        window.openPdf = async (url, title) => {
            document.getElementById('pdf-modal').classList.add('active');
            document.getElementById('pdf-title').textContent = title;
            document.getElementById('pdf-container').innerHTML = '';
            document.getElementById('pdf-loader').classList.remove('hidden');
            state.matches = []; state.currentMatch = -1;
            
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                state.pdfDoc = await loadingTask.promise;
                for (let i = 1; i <= state.pdfDoc.numPages; i++) {
                    await renderPage(i);
                    if (i === 1) document.getElementById('pdf-loader').classList.add('hidden');
                }
            } catch (e) {
                console.warn("Doğrudan yükleme başarısız, proxy deneniyor...", e);
                try {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const fallbackTask = pdfjsLib.getDocument(proxyUrl);
                    state.pdfDoc = await fallbackTask.promise;
                    for (let i = 1; i <= state.pdfDoc.numPages; i++) {
                        await renderPage(i);
                        if (i === 1) document.getElementById('pdf-loader').classList.add('hidden');
                    }
                } catch(err) {
                    showToast("Güvenlik Duvarı Engeli! Döküman yüklenemedi.");
                    document.getElementById('pdf-loader').classList.add('hidden');
                }
            }
        };

        const initAuthAndData = async () => {
            try { await signInAnonymously(auth); } catch (err) { console.warn("Auth uyarısı", err); }
            await loadAppData();
        };

        const loadAppData = async () => {
            state.data = { tapu: { genelge: [], talimat: [] }, kadastro: { genelge: [], talimat: [] }, genel: { genelge: [], talimat: [] } };

            try {
                const collectionPath = `artifacts/${appId}/public/data/mevzuat`;
                const snapshot = await getDocs(collection(db, collectionPath));
                
                snapshot.forEach(doc => {
                    const item = doc.data();
                    const formattedItem = { id: doc.id, ...item };
                    if (state.data[item.section] && state.data[item.section][item.type]) {
                        state.data[item.section][item.type].push(formattedItem);
                    }
                });

                document.getElementById('main-loader-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                animateBg();
                setupEvents();

                const sectionTitle = document.getElementById('selection-title').textContent.toLowerCase();
                if(sectionTitle && document.getElementById('selection-modal').classList.contains('active')) {
                     const body = document.getElementById('selection-body');
                     if(body.innerHTML.includes('GENELGE')) { /* wait */ }
                }

            } catch (err) {
                document.getElementById('loader-text').textContent = "HATA";
                showToast("Veriler çekilirken hata oluştu!");
                console.error(err);
            }
        };

        const getDeleteButton = (id, url) => {
            if(!state.isAdmin) return '';
            return `
            <button onclick="window.deletePdf('${id}', '${url}', event)" class="p-2 text-rose-500 hover:bg-rose-100 rounded-lg ml-auto transition-colors" title="Sil">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>`;
        };

        const handleUpload = async () => {
            const fileInput = document.getElementById('file-input');
            const files = fileInput.files;
            const section = document.getElementById('section-select').value;
            const type = document.getElementById('type-select').value;
            const startBtn = document.getElementById('start-upload-btn');
            
            if (files.length === 0) return showToast("Döküman seçmelisiniz.");
            
            startBtn.disabled = true;
            document.getElementById('upload-progress').classList.remove('hidden');
            const bar = document.getElementById('progress-bar');
            bar.style.width = '0%';
            
            try {
                let completed = 0;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const storageRef = ref(storage, `mevzuat/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const downloadUrl = await getDownloadURL(storageRef);
                    
                    const collectionPath = `artifacts/${appId}/public/data/mevzuat`;
                    await addDoc(collection(db, collectionPath), {
                        title: file.name.replace('.pdf', '').toUpperCase(),
                        url: downloadUrl,
                        section, type, createdAt: new Date().toISOString()
                    });
                    
                    completed++;
                    bar.style.width = `${(completed / files.length) * 100}%`;
                }
                
                showToast(`${files.length} döküman eklendi!`);
                setTimeout(() => {
                    document.getElementById('upload-modal').classList.remove('active');
                    fileInput.value = ''; 
                    loadAppData(); 
                }, 800);
            } catch (e) {
                showToast("Yükleme başarısız!");
                console.error(e);
            } finally {
                startBtn.disabled = false;
            }
        };

        const renderPage = async (num) => {
            const page = await state.pdfDoc.getPage(num);
            const renderScale = 2.0; 
            const vp = page.getViewport({ scale: renderScale });
            const container = document.createElement('div');
            container.className = 'pdf-page-container';
            container.style.width = `${vp.width * (state.scale / renderScale)}px`;
            
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            const ctx = canvas.getContext('2d');
            
            const textLayer = document.createElement('div');
            textLayer.className = 'textLayer';
            textLayer.style.setProperty('--scale-factor', state.scale);

            container.append(canvas, textLayer);
            document.getElementById('pdf-container').append(container);

            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            const textContent = await page.getTextContent();
            pdfjsLib.renderTextLayer({ textContent, container: textLayer, viewport: page.getViewport({ scale: state.scale }), textDivs: [] });
        };

        const performSearch = (query) => {
            if (!query || query.length < 2) {
                document.querySelectorAll('.highlight').forEach(s => s.parentNode.textContent = s.parentNode.textContent);
                state.matches = []; state.currentMatch = -1;
                document.getElementById('pdf-search-info').textContent = '0 / 0';
                return;
            }
            document.querySelectorAll('.highlight').forEach(s => s.parentNode.textContent = s.parentNode.textContent);
            state.matches = [];
            const q = query.toLocaleLowerCase('tr-TR');
            document.querySelectorAll('.textLayer span').forEach(span => {
                if (span.textContent.toLocaleLowerCase('tr-TR').includes(q)) {
                    span.innerHTML = span.textContent.replace(new RegExp(`(${query})`, 'gi'), '<mark class="highlight">$1</mark>');
                    state.matches.push(...span.querySelectorAll('.highlight'));
                }
            });
            document.getElementById('pdf-search-info').textContent = `0 / ${state.matches.length}`;
            if (state.matches[0]) navMatch(0);
        };

        const navMatch = (idx) => {
            if (!state.matches.length) return;
            if (state.matches[state.currentMatch]) state.matches[state.currentMatch].classList.remove('selected');
            state.currentMatch = (idx + state.matches.length) % state.matches.length;
            const target = state.matches[state.currentMatch];
            target.classList.add('selected');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('pdf-search-info').textContent = `${state.currentMatch + 1} / ${state.matches.length}`;
        };

        const renderList = (s, t) => {
            const docs = state.data[s][t] || [];
            docs.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

            const body = document.getElementById('selection-body');
            body.innerHTML = docs.length ? docs.map(d => `
                <div class="p-4 bg-white border border-slate-200 shadow-sm rounded-2xl flex items-center gap-4 cursor-pointer hover:border-indigo-300 hover:shadow-md transition-all" onclick="window.openPdf('${d.url}', '${d.title}')">
                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-bold text-[9px] tracking-tighter shrink-0 border border-indigo-100">PDF</div>
                    <span class="truncate text-[13px] font-bold text-slate-700 w-full">${d.title}</span>
                    ${getDeleteButton(d.id, d.url)}
                </div>`).join('') : '<p class="text-center py-6 text-slate-400 text-sm font-medium">Kayıt bulunamadı.</p>';
        };

        const setupEvents = () => {
            document.getElementById('secret-admin-trigger').ondblclick = () => {
                state.isAdmin = !state.isAdmin;
                showToast(state.isAdmin ? "Yönetici Modu Açık" : "Yönetici Modu Kapalı");
                document.getElementById('upload-btn').style.display = state.isAdmin ? 'block' : 'none';
                
                const sectionTitle = document.getElementById('selection-title').textContent.toLowerCase();
                if(sectionTitle && document.getElementById('selection-modal').classList.contains('active')) {
                     const body = document.getElementById('selection-body');
                     if(!body.innerHTML.includes('GENELGE')) { 
                        document.getElementById('selection-body').innerHTML = `
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <button class="p-8 bg-white border border-slate-200 shadow-sm rounded-3xl font-black text-sm text-slate-700 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition-all uppercase tracking-widest" id="btn-genelge">Genelge</button>
                                <button class="p-8 bg-white border border-slate-200 shadow-sm rounded-3xl font-black text-sm text-slate-700 hover:bg-cyan-600 hover:text-white hover:border-cyan-600 transition-all uppercase tracking-widest" id="btn-talimat">Talimat</button>
                            </div>`;
                        document.getElementById('btn-genelge').onclick = () => renderList(sectionTitle, 'genelge');
                        document.getElementById('btn-talimat').onclick = () => renderList(sectionTitle, 'talimat');
                     }
                }
            };

            document.getElementById('upload-btn').onclick = () => document.getElementById('upload-modal').classList.add('active');

            document.querySelectorAll('[data-section]').forEach(c => c.onclick = () => {
                const s = c.dataset.section;
                document.getElementById('selection-title').textContent = s;
                document.getElementById('selection-modal').classList.add('active');
                document.getElementById('selection-body').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button class="p-8 bg-white border border-slate-200 shadow-sm rounded-3xl font-black text-sm text-slate-700 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition-all uppercase tracking-widest" id="btn-genelge">Genelge</button>
                        <button class="p-8 bg-white border border-slate-200 shadow-sm rounded-3xl font-black text-sm text-slate-700 hover:bg-cyan-600 hover:text-white hover:border-cyan-600 transition-all uppercase tracking-widest" id="btn-talimat">Talimat</button>
                    </div>`;
                document.getElementById('btn-genelge').onclick = () => renderList(s, 'genelge');
                document.getElementById('btn-talimat').onclick = () => renderList(s, 'talimat');
            });

            const searchInput = document.getElementById('search-input');
            const clearSearchBtn = document.getElementById('clear-search-btn');
            const searchResults = document.getElementById('search-results');

            searchInput.oninput = (e) => {
                const q = e.target.value.toLowerCase().trim();
                
                if (q.length > 0) {
                    clearSearchBtn.style.display = 'block';
                    searchResults.classList.remove('hidden');
                } else {
                    clearSearchBtn.style.display = 'none';
                    searchResults.classList.add('hidden');
                    searchResults.innerHTML = '';
                    return;
                }

                if (q.length < 2) return;
                
                const found = [];
                for (let s in state.data) for (let t in state.data[s]) state.data[s][t].forEach(d => { if (d.title.toLowerCase().includes(q)) found.push(d); });
                
                if (found.length > 0) {
                    searchResults.innerHTML = found.slice(0, 6).map(d => `
                        <div class="p-4 bg-white border-b last:border-0 border-slate-100 flex items-center gap-4 cursor-pointer hover:bg-indigo-50 transition-colors" onclick="window.openPdf('${d.url}', '${d.title}')">
                            <div class="w-8 h-8 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-lg flex items-center justify-center font-bold text-[9px] shrink-0">PDF</div>
                            <span class="truncate text-sm font-semibold text-slate-700 w-full">${d.title}</span>
                        </div>`).join('');
                } else {
                    searchResults.innerHTML = '<div class="p-4 text-sm font-medium text-slate-400 text-center">Sonuç bulunamadı.</div>';
                }
            };

            clearSearchBtn.onclick = () => {
                searchInput.value = '';
                searchResults.innerHTML = '';
                searchResults.classList.add('hidden');
                clearSearchBtn.style.display = 'none';
                searchInput.focus();
            };

            const psi = document.getElementById('pdf-search-input');
            psi.oninput = (e) => performSearch(e.target.value);
            psi.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); navMatch(state.currentMatch + 1); } };
            document.getElementById('search-next').onclick = () => navMatch(state.currentMatch + 1);
            document.getElementById('search-prev').onclick = () => navMatch(state.currentMatch - 1);
            
            document.getElementById('zoom-in').onclick = () => { state.scale += 0.2; document.getElementById('zoom-text').textContent = Math.round(state.scale * 100) + '%'; refreshPdfView(); };
            document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(0.4, state.scale - 0.2); document.getElementById('zoom-text').textContent = Math.round(state.scale * 100) + '%'; refreshPdfView(); };
            
            document.getElementById('start-upload-btn').onclick = handleUpload;
            document.getElementById('cancel-upload-btn').onclick = () => document.getElementById('upload-modal').classList.remove('active');
            document.getElementById('refresh-data-btn').onclick = loadAppData;
            document.getElementById('close-selection-btn').onclick = () => document.getElementById('selection-modal').classList.remove('active');
            document.getElementById('close-pdf-btn').onclick = () => { document.getElementById('pdf-modal').classList.remove('active'); state.pdfDoc = null; };
        };

        const refreshPdfView = () => {
            document.querySelectorAll('.pdf-page-container').forEach(async (c, i) => {
                const page = await state.pdfDoc.getPage(i + 1);
                const vp = page.getViewport({ scale: 2.0 });
                c.style.width = `${vp.width * (state.scale / 2.0)}px`;
            });
        };

        const animateBg = () => {
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('dynamic-bg'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 60;
            const pts = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(300).map(() => (Math.random()-0.5)*150), 3)), new THREE.PointsMaterial({ color: 0x6366f1, size: 0.15, transparent: true, opacity: 0.3 }));
            scene.add(pts);
            const loop = () => { requestAnimationFrame(loop); pts.rotation.y += 0.0003; renderer.render(scene, camera); };
            loop();
            window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); });
        };

        initAuthAndData();
    </script>
</body>
</html>
