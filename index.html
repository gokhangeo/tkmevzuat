<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TKGM Mevzuat Sistemi</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%234f46e5'/%3E%3Cpath d='M25 75 L25 25 L75 25 L75 75 Z M25 50 L75 50 M50 25 L50 75' stroke='%23ffffff' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            overflow-x: hidden;
            color: #f8fafc; 
            margin: 0; 
        }

        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Modern Zarif Kart Yapısı */
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        /* Animasyonlar */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            display: none; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal.active { display: flex; animation: scaleIn 0.3s ease-out; }
        
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .modal-content { 
            background: #0f172a; 
            width: 96%; height: 94%; 
            border-radius: 1.5rem; 
            display: flex; flex-direction: column; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05); 
        }
        
        #pdf-scroll-area { 
            overflow: auto; flex-grow: 1; 
            background-color: #0f172a; 
            display: flex; flex-direction: column; 
            align-items: center; padding: 30px 10px; 
            scroll-behavior: smooth;
        }

        .pdf-page-container { 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            background: white; 
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        canvas { display: block; width: 100%; height: auto; }
        
        .textLayer { 
            position: absolute; inset: 0; 
            pointer-events: none; opacity: 1; 
            line-height: 1; overflow: hidden;
        }
        .textLayer span { 
            color: transparent; position: absolute; 
            white-space: pre; cursor: text; 
            transform-origin: 0% 0%; 
        }
        
        .highlight { background-color: rgba(255, 230, 0, 0.3) !important; border-radius: 2px; }
        .highlight.selected { 
            background-color: rgba(255, 140, 0, 0.8) !important;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            outline: 2px solid white;
            z-index: 100;
        }

        .loader { 
            border: 3px solid rgba(79, 70, 229, 0.1); 
            border-top: 3px solid #6366f1; 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: #4f46e5; color: white; padding: 0.8rem 1.5rem; 
            border-radius: 1rem; transition: all 0.4s; z-index: 10000; 
            font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body class="h-full">
    <canvas id="dynamic-bg"></canvas>

    <!-- Loader -->
    <div id="main-loader-container" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center z-[9999]">
        <div class="loader mb-4"></div>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">Yükleniyor</p>
    </div>

    <div id="app-container" class="h-full flex flex-col" style="display: none;">
        <!-- Üst Navigasyon -->
        <nav class="flex justify-between items-center px-6 py-6 fade-in">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span class="text-sm font-black tracking-tighter uppercase">Mevzuat Altyapısı</span>
            </div>
            <div class="flex gap-2">
                <button id="refresh-data-btn" class="p-2.5 glass-card rounded-xl text-slate-400 hover:text-green-400 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
                </button>
                <button id="favorites-main-btn" class="p-2.5 glass-card rounded-xl text-slate-400 hover:text-yellow-400 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                </button>
            </div>
        </nav>

        <main class="flex-grow flex flex-col items-center justify-center px-6 pb-20">
            <!-- Başlık Alanı -->
            <div class="text-center mb-12 fade-in" style="animation-delay: 0.1s">
                <h1 class="text-4xl sm:text-6xl font-black tracking-tight mb-2 uppercase">TKGM MEVZUAT</h1>
                <p class="text-indigo-400/80 text-[10px] sm:text-xs font-bold tracking-[0.4em] uppercase">Gökhan ELGÜL tarafından tasarlanmıştır</p>
            </div>

            <!-- Arama Kutusu -->
            <div class="w-full max-w-2xl mb-12 fade-in" style="animation-delay: 0.2s">
                <div class="relative group">
                    <input type="text" id="search-input" placeholder="Mevzuat dökümanlarında ara..." class="w-full bg-slate-900/50 border border-white/5 rounded-2xl py-4 px-6 text-base text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all shadow-xl placeholder-slate-600">
                    <div id="search-results" class="absolute top-full left-0 w-full mt-2 space-y-1 z-30"></div>
                </div>
            </div>

            <!-- Kategori Kartları -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
                <div data-section="tapu" class="glass-card p-8 rounded-3xl text-center group fade-in cursor-pointer" style="animation-delay: 0.3s">
                    <div class="w-12 h-12 bg-indigo-500/10 text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-5 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-tight">TAPU</h2>
                    <p class="text-slate-500 text-[10px] mt-2 font-bold uppercase tracking-widest">Daire Başkanlığı</p>
                </div>
                
                <div data-section="kadastro" class="glass-card p-8 rounded-3xl text-center group fade-in cursor-pointer" style="animation-delay: 0.4s">
                    <div class="w-12 h-12 bg-cyan-500/10 text-cyan-400 rounded-2xl flex items-center justify-center mx-auto mb-5 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-tight">KADASTRO</h2>
                    <p class="text-slate-500 text-[10px] mt-2 font-bold uppercase tracking-widest">Daire Başkanlığı</p>
                </div>

                <div data-section="genel" class="glass-card p-8 rounded-3xl text-center group fade-in cursor-pointer" style="animation-delay: 0.5s">
                    <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center mx-auto mb-5 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-tight">GENEL</h2>
                    <p class="text-slate-500 text-[10px] mt-2 font-bold uppercase tracking-widest">Müdürlük Birimleri</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Birim Seçimi Modalı -->
    <div id="selection-modal" class="modal">
        <div class="modal-content max-w-xl !h-auto max-h-[85%] p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 id="selection-title" class="text-2xl font-black text-white uppercase tracking-tighter leading-none">Birim</h2>
                <button onclick="closeModal('selection-modal')" class="text-slate-500 p-2 hover:text-red-400 transition-colors">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="selection-body" class="space-y-3"></div>
        </div>
    </div>

    <!-- PDF Modal -->
    <div id="pdf-modal" class="modal">
        <div class="modal-content">
            <header class="bg-[#020617] p-4 border-b border-white/5 flex flex-col gap-4 shadow-xl">
                <div class="flex items-center justify-between">
                    <h3 id="pdf-title" class="text-sm font-bold text-indigo-400 truncate max-w-[50%] tracking-tight uppercase">DÖKÜMAN</h3>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center glass-card rounded-2xl p-1 ring-1 ring-white/5">
                            <button id="zoom-out" class="p-2 text-white hover:bg-white/10 rounded-xl transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            <span id="zoom-text" class="text-xs font-black text-white min-w-[55px] text-center">100%</span>
                            <button id="zoom-in" class="p-2 text-white hover:bg-white/10 rounded-xl transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        </div>
                        <button onclick="closePdf()" class="p-2.5 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center bg-black/40 rounded-2xl px-6 py-3.5 border border-white/5 shadow-inner focus-within:ring-2 focus-within:ring-indigo-500 transition-all">
                    <svg class="text-slate-600 mr-4" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="pdf-search-input" placeholder="Dökümanda ara..." class="bg-transparent border-none focus:ring-0 text-white w-full text-base placeholder-slate-700">
                    <div id="pdf-search-info" class="text-[10px] font-black text-white bg-indigo-600 px-3 py-1.5 rounded-xl ml-3 whitespace-nowrap shadow-lg">0 / 0</div>
                    <div class="flex gap-4 ml-6 border-l border-white/10 pl-6">
                        <button id="search-prev" class="text-slate-500 hover:text-white transition transform active:scale-75"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button id="search-next" class="text-slate-500 hover:text-white transition transform active:scale-75"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg></button>
                    </div>
                </div>
            </header>

            <div id="pdf-scroll-area">
                <div id="pdf-container"></div>
                <div id="pdf-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-[#020617]/95 z-20">
                     <div class="loader mb-4"></div>
                     <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-[0.3em] animate-pulse">İşleniyor</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const p_vals = ["ghp_jA0Y2jq", "excZgdcIu6", "FglCOcaKo1", "us0070QYf"];
        const getAuth = () => p_vals.join('');

        const GITHUB = { user: "gokhangeo", repo: "tkmevzuat", branch: "main" };
        const CDN = `https://cdn.jsdelivr.net/gh/${GITHUB.user}/${GITHUB.repo}@${GITHUB.branch}/`;

        let state = {
            data: { tapu: {}, kadastro: {}, genel: {} },
            pdfDoc: null,
            matches: [],
            currentMatch: -1,
            scale: 1.15
        };

        const initBg = () => {
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('dynamic-bg'), alpha: true, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 40;
            
            const count = 120;
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 100;
            
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0x4f46e5, size: 0.2, transparent: true, opacity: 0.3 });
            const points = new THREE.Points(geom, mat);
            scene.add(points);
            
            const animate = () => { requestAnimationFrame(animate); points.rotation.y += 0.0002; renderer.render(scene, camera); };
            animate();
            window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
        };

        async function fetchRepo(path) {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`, { headers: { 'Authorization': `token ${getAuth()}` } });
                const files = await res.json();
                return Array.isArray(files) ? files.filter(f => f.name.endsWith('.pdf')).map(f => ({ title: f.name.replace('.pdf','').replace(/_/g,' '), path: f.path })) : [];
            } catch { return []; }
        }

        async function initializeApp() {
            const targets = [['tapu/genelgeler', 'tapu', 'genelge'], ['tapu/talimatlar', 'tapu', 'talimat'], ['kadastro/genelgeler', 'kadastro', 'genelge'], ['kadastro/talimatlar', 'kadastro', 'talimat'], ['genel/genelgeler', 'genel', 'genelge'], ['genel/talimatlar', 'genel', 'talimat']];
            const results = await Promise.all(targets.map(t => fetchRepo(t[0])));
            targets.forEach((t, i) => state.data[t[1]][t[2]] = results[i]);
            document.getElementById('main-loader-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            initBg();
            setupEvents();
        }

        async function openPdf(path, title) {
            document.getElementById('pdf-modal').classList.add('active');
            document.getElementById('pdf-title').textContent = title;
            document.getElementById('pdf-container').innerHTML = '';
            document.getElementById('pdf-loader').style.display = 'flex';
            document.getElementById('pdf-search-input').value = '';
            document.getElementById('pdf-search-info').textContent = '0 / 0';
            state.matches = [];
            state.currentMatch = -1;
            state.scale = window.innerWidth < 768 ? 0.85 : 1.15;
            updateZoomText();

            try {
                const res = await fetch(`${CDN}${path}`);
                state.pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(await res.arrayBuffer()) }).promise;
                
                for(let i=1; i<=state.pdfDoc.numPages; i++) {
                    await renderPage(i);
                    if (i === 1) document.getElementById('pdf-loader').style.display = 'none';
                }
            } catch { 
                document.getElementById('pdf-loader').style.display = 'none';
                showToast("Hata: Döküman yüklenemedi!"); 
            }
        }

        async function renderPage(num) {
            const page = await state.pdfDoc.getPage(num);
            const renderScale = 2.0; 
            const viewport = page.getViewport({ scale: renderScale });

            const container = document.createElement('div');
            container.className = 'pdf-page-container';
            container.id = `page-container-${num}`;
            
            const visualWidth = viewport.width * (state.scale / renderScale);
            const visualHeight = viewport.height * (state.scale / renderScale);
            container.style.width = `${visualWidth}px`;
            container.style.height = `${visualHeight}px`;
            
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            
            const textLayerDiv = document.createElement('div');
            textLayerDiv.className = 'textLayer';
            textLayerDiv.id = `text-layer-${num}`;
            textLayerDiv.style.setProperty('--scale-factor', state.scale);

            container.appendChild(canvas);
            container.appendChild(textLayerDiv);
            document.getElementById('pdf-container').appendChild(container);

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            const textContent = await page.getTextContent();
            pdfjsLib.renderTextLayer({ 
                textContent, 
                container: textLayerDiv, 
                viewport: page.getViewport({ scale: state.scale }),
                textDivs: [] 
            });
        }

        function performSearch(query) {
            if (!query || query.length < 2) {
                clearHighlights();
                state.matches = [];
                state.currentMatch = -1;
                document.getElementById('pdf-search-info').textContent = '0 / 0';
                return;
            }

            clearHighlights();
            state.matches = [];
            const q = query.toLocaleLowerCase('tr-TR');
            const spans = document.querySelectorAll('.textLayer span');

            spans.forEach(span => {
                const originalText = span.textContent;
                const textLower = originalText.toLocaleLowerCase('tr-TR');
                
                if (textLower.includes(q)) {
                    const regex = new RegExp(`(${query})`, 'gi');
                    span.innerHTML = originalText.replace(regex, '<mark class="highlight">$1</mark>');
                    const marks = span.querySelectorAll('.highlight');
                    marks.forEach(m => state.matches.push(m));
                }
            });

            document.getElementById('pdf-search-info').textContent = `0 / ${state.matches.length}`;
            if (state.matches.length > 0) navigateMatch(0);
        }

        function clearHighlights() {
            document.querySelectorAll('.textLayer span').forEach(span => {
                if (span.querySelector('mark')) span.textContent = span.textContent;
            });
        }

        function navigateMatch(idx) {
            if (state.matches.length === 0) return;
            if (state.currentMatch !== -1 && state.matches[state.currentMatch]) {
                state.matches[state.currentMatch].classList.remove('selected');
            }
            state.currentMatch = (idx + state.matches.length) % state.matches.length;
            const target = state.matches[state.currentMatch];
            target.classList.add('selected');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('pdf-search-info').textContent = `${state.currentMatch + 1} / ${state.matches.length}`;
        }

        function updateZoomText() { document.getElementById('zoom-text').textContent = Math.round(state.scale * 100) + '%'; }

        function setupEvents() {
            document.querySelectorAll('[data-section]').forEach(c => c.onclick = () => {
                const s = c.dataset.section;
                document.getElementById('selection-title').textContent = s;
                document.getElementById('selection-modal').classList.add('active');
                document.getElementById('selection-body').innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <button class="p-8 glass-card rounded-3xl font-black text-xl hover:bg-indigo-600 transition-all uppercase" onclick="renderDocList('${s}', 'genelge')">Genelge</button>
                        <button class="p-8 glass-card rounded-3xl font-black text-xl hover:bg-cyan-600 transition-all uppercase" onclick="renderDocList('${s}', 'talimat')">Talimat</button>
                    </div>`;
            });

            document.getElementById('search-input').oninput = (e) => {
                const q = e.target.value.toLowerCase().trim();
                const res = document.getElementById('search-results');
                if(q.length < 2) { res.innerHTML = ''; return; }
                const found = [];
                for(let s in state.data) for(let t in state.data[s]) state.data[s][t].forEach(d => { if(d.title.toLowerCase().includes(q)) found.push(d); });
                res.innerHTML = found.slice(0,6).map(d => `<div class="p-4 glass-card rounded-2xl cursor-pointer hover:border-indigo-500 transition-all shadow-xl flex items-center gap-3" onclick="openPdf('${d.path}','${d.title}')"><span class="font-black text-indigo-400 uppercase text-[10px]">PDF</span><span class="text-sm">${d.title}</span></div>`).join('');
            };

            const pdfSearchInput = document.getElementById('pdf-search-input');
            pdfSearchInput.addEventListener('input', (e) => performSearch(e.target.value));
            pdfSearchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (state.matches.length > 0) navigateMatch(state.currentMatch + 1);
                }
            });

            document.getElementById('search-next').onclick = () => navigateMatch(state.currentMatch + 1);
            document.getElementById('search-prev').onclick = () => navigateMatch(state.currentMatch - 1);
            
            document.getElementById('zoom-in').onclick = () => { state.scale += 0.15; rebuildPdf(); };
            document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(0.4, state.scale - 0.15); rebuildPdf(); };
            document.getElementById('refresh-data-btn').onclick = () => initializeApp();
        }

        window.renderDocList = (s, t) => {
            const docs = state.data[s][t] || [];
            document.getElementById('selection-body').innerHTML = `<div class="space-y-3 max-h-[50vh] overflow-y-auto pr-2">${docs.map(d => `<div class="p-5 glass-card rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-white/5 transition-all" onclick="openPdf('${d.path}','${d.title}')"><div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center font-black text-[10px] uppercase">PDF</div><span class="truncate text-sm font-bold uppercase">${d.title}</span></div>`).join('')}</div>`;
        };

        async function rebuildPdf() {
            updateZoomText();
            const currentSearch = document.getElementById('pdf-search-input').value;
            document.getElementById('pdf-container').innerHTML = '';
            for(let i=1; i<=state.pdfDoc.numPages; i++) { await renderPage(i); }
            if (currentSearch) performSearch(currentSearch);
        }

        const closeModal = (id) => document.getElementById(id).classList.remove('active');
        const closePdf = () => { document.getElementById('pdf-modal').classList.remove('active'); state.pdfDoc = null; };
        const showToast = (m) => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };

        window.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('pdf-modal'); closeModal('selection-modal'); } });

        initializeApp();
    </script>
</body>
</html>
