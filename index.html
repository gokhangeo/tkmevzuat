<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TKGM Mevzuat Sistemi</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%234f46e5'/%3E%3Cpath d='M25 75 L25 25 L75 25 L75 75 Z M25 50 L75 50 M50 25 L50 75' stroke='%23ffffff' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; overflow-x: hidden; color: #f8fafc; margin: 0; }
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            display: none; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal.active { display: flex; animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .modal-content { 
            background: #0f172a; 
            width: 96%; height: 94%; 
            border-radius: 1.5rem; 
            display: flex; flex-direction: column; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05); 
        }
        
        #pdf-scroll-area { 
            overflow: auto; flex-grow: 1; 
            background-color: #0f172a; 
            display: flex; flex-direction: column; 
            align-items: center; padding: 30px 10px; 
            scroll-behavior: smooth;
        }

        .pdf-page-container { 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            background: white; 
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        canvas { display: block; width: 100%; height: auto; }
        
        .textLayer { 
            position: absolute; inset: 0; 
            pointer-events: none; opacity: 1; 
            line-height: 1; overflow: hidden;
        }
        .textLayer span { 
            color: transparent; position: absolute; 
            white-space: pre; cursor: text; 
            transform-origin: 0% 0%; 
        }
        
        .highlight { background-color: rgba(255, 230, 0, 0.3) !important; border-radius: 2px; }
        .highlight.selected { 
            background-color: rgba(255, 140, 0, 0.8) !important;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            outline: 2px solid white;
            z-index: 100;
        }

        .loader { 
            border: 3px solid rgba(79, 70, 229, 0.1); 
            border-top: 3px solid #6366f1; 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: #4f46e5; color: white; padding: 0.8rem 1.5rem; 
            border-radius: 1rem; transition: all 0.4s; z-index: 10000; 
            font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body class="h-full">
    <canvas id="dynamic-bg"></canvas>

    <div id="main-loader-container" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center z-[9999]">
        <div class="loader mb-4"></div>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">Bulut Bağlantısı Kuruluyor</p>
    </div>

    <div id="app-container" class="h-full flex flex-col" style="display: none;">
        <nav class="flex justify-between items-center px-6 py-6 fade-in">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span class="text-[10px] font-black tracking-widest uppercase opacity-70">TKGM Portal</span>
            </div>
            <div class="flex gap-2">
                <button id="upload-btn" class="p-2 glass-card rounded-xl text-indigo-400 hover:text-indigo-300 transition-colors" title="Döküman Ekle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="refresh-data-btn" class="p-2 glass-card rounded-xl text-slate-400 hover:text-green-400 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
                </button>
            </div>
        </nav>

        <main class="flex-grow flex flex-col items-center justify-center px-6 pb-20">
            <div class="text-center mb-10 fade-in">
                <h1 class="text-4xl sm:text-6xl font-black tracking-tight mb-2 uppercase leading-none">TKGM MEVZUAT</h1>
                <p class="text-indigo-400/90 text-[10px] sm:text-xs font-bold tracking-[0.4em] uppercase">Gökhan ELGÜL tarafından tasarlanmıştır</p>
            </div>

            <div class="w-full max-w-xl mb-12 fade-in" style="animation-delay: 0.1s">
                <div class="relative group">
                    <input type="text" id="search-input" placeholder="Döküman ara..." class="w-full bg-slate-900/50 border border-white/5 rounded-2xl py-4 px-6 text-sm text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all shadow-xl placeholder-slate-700">
                    <div id="search-results" class="absolute top-full left-0 w-full mt-2 space-y-1 z-30"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl fade-in" style="animation-delay: 0.2s">
                <div data-section="tapu" class="glass-card p-8 rounded-3xl text-center group cursor-pointer active:scale-95">
                    <div class="w-12 h-12 bg-indigo-500/10 text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    </div>
                    <h2 class="text-lg font-bold text-white uppercase tracking-tight">TAPU</h2>
                </div>
                <div data-section="kadastro" class="glass-card p-8 rounded-3xl text-center group cursor-pointer active:scale-95">
                    <div class="w-12 h-12 bg-cyan-500/10 text-cyan-400 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <h2 class="text-lg font-bold text-white uppercase tracking-tight">KADASTRO</h2>
                </div>
                <div data-section="genel" class="glass-card p-8 rounded-3xl text-center group cursor-pointer active:scale-95">
                    <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h2 class="text-lg font-bold text-white uppercase tracking-tight">GENEL</h2>
                </div>
            </div>
        </main>
    </div>

    <!-- Modallar -->
    <div id="upload-modal" class="modal">
        <div class="modal-content max-w-lg !h-auto p-8">
            <h2 class="text-xl font-black mb-6 tracking-tighter uppercase text-white">Döküman Ekle</h2>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">PDF Dosyası</label>
                    <input type="file" id="file-input" accept=".pdf" class="w-full bg-slate-900/50 border border-white/5 p-3 rounded-xl text-xs outline-none focus:border-indigo-500 text-white">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Birim</label>
                        <select id="section-select" class="w-full bg-slate-900/50 border border-white/5 p-3 rounded-xl text-xs outline-none focus:border-indigo-500 text-white">
                            <option value="tapu">TAPU</option>
                            <option value="kadastro">KADASTRO</option>
                            <option value="genel">GENEL</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Tür</label>
                        <select id="type-select" class="w-full bg-slate-900/50 border border-white/5 p-3 rounded-xl text-xs outline-none focus:border-indigo-500 text-white">
                            <option value="genelge">GENELGE</option>
                            <option value="talimat">TALİMAT</option>
                        </select>
                    </div>
                </div>
                <div id="upload-progress" class="hidden pt-2">
                    <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button id="cancel-upload-btn" class="flex-1 p-3 glass-card rounded-xl font-bold uppercase tracking-widest text-[10px] text-white">İptal</button>
                    <button id="start-upload-btn" class="flex-1 p-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-black uppercase tracking-widest text-[10px] text-white">Yükle</button>
                </div>
            </div>
        </div>
    </div>

    <div id="selection-modal" class="modal">
        <div class="modal-content max-w-lg !h-auto max-h-[80%] p-8">
            <h2 id="selection-title" class="text-xl font-black uppercase mb-6 tracking-tighter text-white">Birim</h2>
            <div id="selection-body" class="space-y-2 pr-2 overflow-y-auto"></div>
            <button id="close-selection-btn" class="mt-6 w-full p-3 glass-card rounded-xl font-bold uppercase text-[10px] tracking-widest text-white">Kapat</button>
        </div>
    </div>

    <div id="pdf-modal" class="modal">
        <div class="modal-content relative">
            <header class="bg-[#020617] p-4 border-b border-white/5 flex flex-col gap-4 shadow-xl">
                <div class="flex items-center justify-between">
                    <h3 id="pdf-title" class="text-xs font-bold text-indigo-400 uppercase truncate max-w-[50%]">GÖRÜNTÜLENİYOR</h3>
                    <div class="flex gap-2">
                        <div class="flex glass-card rounded-xl p-0.5">
                            <button id="zoom-out" class="p-1.5 hover:text-indigo-400"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            <span id="zoom-text" class="text-[9px] font-black min-w-[40px] flex items-center justify-center text-white">100%</span>
                            <button id="zoom-in" class="p-1.5 hover:text-indigo-400"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        </div>
                        <button id="close-pdf-btn" class="p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    </div>
                </div>
                <div class="flex items-center bg-black/40 rounded-xl px-4 py-2 border border-white/5 shadow-inner">
                    <svg class="text-slate-600 mr-2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="pdf-search-input" placeholder="Dökümanda ara..." class="bg-transparent border-none focus:ring-0 text-white w-full text-sm">
                    <div id="pdf-search-info" class="text-[9px] font-black text-white bg-indigo-600 px-2 py-1 rounded ml-2 whitespace-nowrap">0 / 0</div>
                    <div class="flex gap-2 ml-3 border-l border-white/10 pl-3">
                        <button id="search-prev" class="p-0.5 hover:text-white text-slate-400 transition transform active:scale-75"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button id="search-next" class="p-0.5 hover:text-white text-slate-400 transition transform active:scale-75"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg></button>
                    </div>
                </div>
            </header>
            <div id="pdf-scroll-area">
                <div id="pdf-container"></div>
                <div id="pdf-loader" class="absolute inset-0 flex items-center justify-center bg-[#020617]/95 hidden z-50">
                    <div class="loader"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const apiKey_p1 = "AIzaSyDxq8AI16Y";
        const apiKey_p2 = "1jNuJMLES8NNEqKlGg2Ul4JI";
        
        const firebaseConfig = {
            apiKey: apiKey_p1 + apiKey_p2,
            authDomain: "mevzuat-f0699.firebaseapp.com",
            databaseURL: "https://mevzuat-f0699-default-rtdb.firebaseio.com",
            projectId: "mevzuat-f0699",
            storageBucket: "mevzuat-f0699.firebasestorage.app",
            messagingSenderId: "960929396368",
            appId: "1:960929396368:web:2faa0cbfc5cf4e3dd34a15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mevzuat-f0699';

        let state = { user: null, data: { tapu: {}, kadastro: {}, genel: {} }, pdfDoc: null, matches: [], currentMatch: -1, scale: 1.15 };

        const showToast = (m) => {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        const initAuth = async () => {
            try {
                // Ensure auth is initialized properly
                const userCredential = await signInAnonymously(auth);
                state.user = userCredential.user;
                loadAppData();
            } catch (err) {
                console.error("Auth error:", err);
                showToast("Bulut bağlantı hatası!");
            }
        };

        const loadAppData = async () => {
            if (!state.user) return;
            const collectionPath = `artifacts/${appId}/public/data/mevzuat`;
            
            try {
                const snapshot = await getDocs(collection(db, collectionPath));
                state.data = { 
                    tapu: { genelge: [], talimat: [] }, 
                    kadastro: { genelge: [], talimat: [] }, 
                    genel: { genelge: [], talimat: [] } 
                };

                snapshot.forEach(doc => {
                    const item = doc.data();
                    if (state.data[item.section] && state.data[item.section][item.type]) {
                        state.data[item.section][item.type].push({ id: doc.id, ...item });
                    }
                });
                
                document.getElementById('main-loader-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                animateBg();
                setupEvents();
            } catch (err) {
                console.error("Data error:", err);
                showToast("Veri çekilemedi!");
            }
        };

        const handleUpload = async () => {
            const fileInput = document.getElementById('file-input');
            const section = document.getElementById('section-select').value;
            const type = document.getElementById('type-select').value;
            const startBtn = document.getElementById('start-upload-btn');

            if (!fileInput.files[0]) return showToast("Döküman seçmelisiniz.");
            
            startBtn.disabled = true;
            document.getElementById('upload-progress').classList.remove('hidden');
            const bar = document.getElementById('progress-bar');
            
            try {
                const file = fileInput.files[0];
                const storageRef = ref(storage, `mevzuat/${Date.now()}_${file.name}`);
                
                bar.style.width = '30%';
                await uploadBytes(storageRef, file);
                
                bar.style.width = '60%';
                const downloadUrl = await getDownloadURL(storageRef);
                
                const collectionPath = `artifacts/${appId}/public/data/mevzuat`;
                await addDoc(collection(db, collectionPath), {
                    title: file.name.replace('.pdf', '').toUpperCase(),
                    url: downloadUrl,
                    section,
                    type,
                    createdAt: new Date().toISOString()
                });
                
                bar.style.width = '100%';
                showToast("Döküman sisteme eklendi!");
                setTimeout(() => {
                    document.getElementById('upload-modal').classList.remove('active');
                    loadAppData();
                }, 800);
            } catch (e) {
                showToast("Yükleme başarısız!");
            } finally {
                startBtn.disabled = false;
            }
        };

        const renderPage = async (num) => {
            const page = await state.pdfDoc.getPage(num);
            const renderScale = 2.0; 
            const vp = page.getViewport({ scale: renderScale });
            const container = document.createElement('div');
            container.className = 'pdf-page-container';
            container.style.width = `${vp.width * (state.scale / renderScale)}px`;
            
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            
            const textLayer = document.createElement('div');
            textLayer.className = 'textLayer';
            textLayer.style.setProperty('--scale-factor', state.scale);

            container.append(canvas, textLayer);
            document.getElementById('pdf-container').append(container);

            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            const textContent = await page.getTextContent();
            pdfjsLib.renderTextLayer({ textContent, container: textLayer, viewport: page.getViewport({ scale: state.scale }), textDivs: [] });
        };

        const openPdf = async (url, title) => {
            const modal = document.getElementById('pdf-modal');
            modal.classList.add('active');
            document.getElementById('pdf-title').textContent = title;
            document.getElementById('pdf-container').innerHTML = '';
            document.getElementById('pdf-loader').classList.remove('hidden');
            state.matches = [];
            state.currentMatch = -1;
            
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                state.pdfDoc = await loadingTask.promise;
                for (let i = 1; i <= state.pdfDoc.numPages; i++) {
                    await renderPage(i);
                    if (i === 1) document.getElementById('pdf-loader').classList.add('hidden');
                }
            } catch (e) {
                showToast("PDF yüklenemedi!");
                document.getElementById('pdf-loader').classList.add('hidden');
            }
        };

        const setupEvents = () => {
            document.querySelectorAll('[data-section]').forEach(c => c.onclick = () => {
                const s = c.dataset.section;
                document.getElementById('selection-title').textContent = s;
                document.getElementById('selection-modal').classList.add('active');
                document.getElementById('selection-body').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button class="p-6 glass-card rounded-2xl font-bold uppercase text-xs text-white" id="btn-genelge">Genelge</button>
                        <button class="p-6 glass-card rounded-2xl font-bold uppercase text-xs text-white" id="btn-talimat">Talimat</button>
                    </div>`;
                document.getElementById('btn-genelge').onclick = () => renderList(s, 'genelge');
                document.getElementById('btn-talimat').onclick = () => renderList(s, 'talimat');
            });

            document.getElementById('search-input').oninput = (e) => {
                const q = e.target.value.toLowerCase().trim();
                const res = document.getElementById('search-results');
                if (q.length < 2) { res.innerHTML = ''; return; }
                const found = [];
                for (let s in state.data) for (let t in state.data[s]) state.data[s][t].forEach(d => { if (d.title.toLowerCase().includes(q)) found.push(d); });
                res.innerHTML = found.slice(0, 5).map(d => `
                    <div class="p-3 glass-card rounded-xl flex items-center gap-3 cursor-pointer search-item" data-url="${d.url}" data-title="${d.title}">
                        <div class="w-7 h-7 bg-indigo-500/10 text-indigo-400 rounded-lg flex items-center justify-center font-bold text-[8px]">PDF</div>
                        <span class="truncate text-[11px] font-bold text-white">${d.title}</span>
                    </div>`).join('');
                res.querySelectorAll('.search-item').forEach(el => el.onclick = () => openPdf(el.dataset.url, el.dataset.title));
            };

            const psi = document.getElementById('pdf-search-input');
            psi.oninput = (e) => {
                const q = e.target.value.toLocaleLowerCase('tr-TR');
                if (q.length < 2) { clearHighlights(); return; }
                clearHighlights();
                state.matches = [];
                document.querySelectorAll('.textLayer span').forEach(span => {
                    if (span.textContent.toLocaleLowerCase('tr-TR').includes(q)) {
                        span.innerHTML = span.textContent.replace(new RegExp(`(${q})`, 'gi'), '<mark class="highlight">$1</mark>');
                        state.matches.push(...span.querySelectorAll('.highlight'));
                    }
                });
                document.getElementById('pdf-search-info').textContent = `0 / ${state.matches.length}`;
                if (state.matches[0]) navMatch(0);
            };

            const clearHighlights = () => {
                document.querySelectorAll('.textLayer span').forEach(span => {
                    if (span.querySelector('mark')) span.textContent = span.textContent;
                });
            };

            const navMatch = (idx) => {
                if (!state.matches.length) return;
                if (state.matches[state.currentMatch]) state.matches[state.currentMatch].classList.remove('selected');
                state.currentMatch = (idx + state.matches.length) % state.matches.length;
                const target = state.matches[state.currentMatch];
                target.classList.add('selected');
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                document.getElementById('pdf-search-info').textContent = `${state.currentMatch + 1} / ${state.matches.length}`;
            };

            psi.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); navMatch(state.currentMatch + 1); } };
            document.getElementById('search-next').onclick = () => navMatch(state.currentMatch + 1);
            document.getElementById('search-prev').onclick = () => navMatch(state.currentMatch - 1);
            
            document.getElementById('zoom-in').onclick = () => { state.scale += 0.2; updateZoomText(); refreshPdfView(); };
            document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(0.4, state.scale - 0.2); updateZoomText(); refreshPdfView(); };
            
            document.getElementById('start-upload-btn').onclick = handleUpload;
            document.getElementById('upload-btn').onclick = () => document.getElementById('upload-modal').classList.add('active');
            document.getElementById('cancel-upload-btn').onclick = () => document.getElementById('upload-modal').classList.remove('active');
            document.getElementById('refresh-data-btn').onclick = loadAppData;
            document.getElementById('close-selection-btn').onclick = () => document.getElementById('selection-modal').classList.remove('active');
            document.getElementById('close-pdf-btn').onclick = () => { document.getElementById('pdf-modal').classList.remove('active'); state.pdfDoc = null; };
        };

        const renderList = (s, t) => {
            const docs = state.data[s][t] || [];
            const body = document.getElementById('selection-body');
            body.innerHTML = docs.length ? docs.map(d => `
                <div class="p-4 glass-card rounded-2xl flex items-center gap-4 cursor-pointer pdf-item" data-url="${d.url}" data-title="${d.title}">
                    <div class="w-9 h-9 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center font-bold text-[9px]">PDF</div>
                    <span class="truncate text-[11px] font-bold uppercase text-white">${d.title}</span>
                </div>`).join('') : '<p class="text-center py-6 opacity-30 text-[10px] text-white">Döküman yok.</p>';
            
            body.querySelectorAll('.pdf-item').forEach(el => { el.onclick = () => openPdf(el.dataset.url, el.dataset.title); });
        };

        const updateZoomText = () => document.getElementById('zoom-text').textContent = Math.round(state.scale * 100) + '%';
        const refreshPdfView = () => {
            document.querySelectorAll('.pdf-page-container').forEach(async (c, i) => {
                const page = await state.pdfDoc.getPage(i + 1);
                const vp = page.getViewport({ scale: 2.0 });
                c.style.width = `${vp.width * (state.scale / 2.0)}px`;
            });
        };

        const animateBg = () => {
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('dynamic-bg'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 60;
            const pts = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(300).map(() => (Math.random()-0.5)*150), 3)), new THREE.PointsMaterial({ color: 0x4f46e5, size: 0.15, transparent: true, opacity: 0.4 }));
            scene.add(pts);
            const loop = () => { requestAnimationFrame(loop); pts.rotation.y += 0.0005; renderer.render(scene, camera); };
            loop();
        };

        initAuth();
    </script>
</body>
</html>
