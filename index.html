<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TKGM Mevzuat Sistemi</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%234f46e5'/%3E%3Cpath d='M25 75 L25 25 L75 25 L75 75 Z M25 50 L75 50 M50 25 L50 75' stroke='%23ffffff' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; overflow-y: auto; color: #f1f5f9; margin: 0; }
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; width: 98%; height: 96%; border-radius: 1.5rem; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        #pdf-scroll-area { 
            overflow: auto; 
            flex-grow: 1; 
            background-color: #334155; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 10px; 
            scroll-behavior: smooth;
        }

        .pdf-page-container { 
            position: relative; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6); 
            background: white; 
            margin-bottom: 40px;
            flex-shrink: 0;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: auto; }
        
        /* Metin Katmanı ve Vurgulama - KESİN HİZALAMA */
        .textLayer { 
            position: absolute; 
            inset: 0; 
            pointer-events: auto; 
            opacity: 1; 
            line-height: 1; 
            overflow: hidden;
        }
        .textLayer span { 
            color: transparent; 
            position: absolute; 
            white-space: pre; 
            cursor: text; 
            transform-origin: 0% 0%; 
        }
        
        .highlight { background-color: rgba(255, 220, 0, 0.4) !important; border-radius: 2px; }
        .highlight.selected { 
            background-color: rgba(255, 100, 0, 0.85) !important;
            box-shadow: 0 0 25px rgba(255, 100, 0, 0.7);
            outline: 2px solid white;
            z-index: 10;
        }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6366f1; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #4f46e5; color: white; padding: 1rem 2.5rem; border-radius: 1.25rem; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; font-weight: 600; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body class="h-full">
    <canvas id="dynamic-bg"></canvas>

    <div id="main-loader-container" class="fixed inset-0 bg-[#0f172a] flex flex-col items-center justify-center z-[9999]">
        <div class="loader mb-6"></div>
        <p class="text-indigo-400 font-bold tracking-[0.3em] animate-pulse uppercase text-sm">Sistem Hazırlanıyor</p>
    </div>

    <div id="app-container" class="content-wrapper h-full flex flex-col" style="display: none;">
        <div class="absolute top-8 right-8 z-10 flex gap-4">
            <button id="refresh-data-btn" class="p-3.5 glass rounded-2xl text-green-400 hover:scale-110 active:scale-95 transition-all shadow-2xl" title="Yenile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
            </button>
            <button id="favorites-main-btn" class="p-3.5 glass rounded-2xl text-yellow-400 hover:scale-110 active:scale-95 transition-all shadow-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
            </button>
        </div>

        <main class="p-6 sm:p-20 flex-grow flex flex-col items-center">
            <header class="text-center mb-20">
                <h1 class="text-6xl sm:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-indigo-400 to-cyan-500 tracking-tighter uppercase">TKGM MEVZUAT</h1>
                <p class="text-slate-500 text-sm mt-4 uppercase tracking-[0.5em] font-extrabold opacity-80">Profesyonel Döküman Yönetimi</p>
            </header>

            <div class="max-w-3xl w-full mb-20">
                <div class="relative group">
                    <input type="text" id="search-input" placeholder="Mevzuat dökümanlarında ara..." class="w-full glass border-0 rounded-3xl py-6 px-10 text-2xl text-white focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all shadow-[0_35px_60px_-15px_rgba(0,0,0,0.5)] placeholder-slate-600">
                    <div id="search-results" class="absolute top-full left-0 w-full mt-6 space-y-3 z-20"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl w-full">
                <div data-section="tapu" class="glass p-14 rounded-[3.5rem] hover:border-indigo-500 transition-all cursor-pointer text-center group active:scale-95 shadow-2xl">
                    <div class="w-20 h-20 bg-indigo-500/10 text-indigo-400 rounded-[2rem] flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition duration-500 shadow-inner">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight">TAPU</h2>
                </div>
                <div data-section="kadastro" class="glass p-14 rounded-[3.5rem] hover:border-cyan-500 transition-all cursor-pointer text-center group active:scale-95 shadow-2xl">
                    <div class="w-20 h-20 bg-cyan-500/10 text-cyan-400 rounded-[2rem] flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition duration-500 shadow-inner">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight">KADASTRO</h2>
                </div>
                <div data-section="genel" class="glass p-14 rounded-[3.5rem] hover:border-emerald-500 transition-all cursor-pointer text-center group active:scale-95 shadow-2xl">
                    <div class="w-20 h-20 bg-emerald-500/10 text-emerald-400 rounded-[2rem] flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition duration-500 shadow-inner">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight">GENEL</h2>
                </div>
            </div>
        </main>
    </div>

    <!-- Birim Seçimi -->
    <div id="selection-modal" class="modal">
        <div class="modal-content max-w-2xl !h-auto max-h-[92%] p-10">
            <div class="flex justify-between items-center mb-10">
                <h2 id="selection-title" class="text-4xl font-black text-white uppercase tracking-tighter">Birim</h2>
                <button onclick="closeModal('selection-modal')" class="text-slate-500 p-3 hover:bg-red-500/10 hover:text-red-400 rounded-full transition"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div id="selection-body" class="space-y-5"></div>
        </div>
    </div>

    <!-- PDF Modal -->
    <div id="pdf-modal" class="modal">
        <div class="modal-content">
            <header class="bg-[#111827] p-6 border-b border-slate-800 flex flex-col gap-6 shadow-2xl">
                <div class="flex items-center justify-between">
                    <h3 id="pdf-title" class="text-xl font-bold text-white truncate max-w-[50%] tracking-tight">Döküman</h3>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center glass rounded-[1.25rem] p-1 shadow-inner">
                            <button id="zoom-out" class="p-2.5 text-white hover:bg-slate-700 rounded-xl transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                            <span id="zoom-text" class="text-sm font-black text-indigo-400 min-w-[70px] text-center">100%</span>
                            <button id="zoom-in" class="p-2.5 text-white hover:bg-slate-700 rounded-xl transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                        </div>
                        <button onclick="closePdf()" class="p-3.5 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500/20 transition-all active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                    </div>
                </div>
                
                <div class="flex items-center bg-black/50 rounded-3xl px-7 py-4 border border-slate-800 shadow-inner focus-within:ring-2 focus-within:ring-indigo-500 transition-all">
                    <svg class="text-slate-600 mr-4" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="pdf-search-input" placeholder="Dökümanda ara... (Enter: Sonraki)" class="bg-transparent border-none focus:ring-0 text-white w-full text-xl placeholder-slate-700">
                    <div id="pdf-search-info" class="text-sm font-black text-white bg-indigo-600 px-5 py-2.5 rounded-2xl ml-4 whitespace-nowrap shadow-lg uppercase tracking-tighter">0 / 0</div>
                    <div class="flex gap-4 ml-6 border-l border-slate-800 pl-6">
                        <button id="search-prev" class="text-slate-500 hover:text-white transition active:scale-75"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <button id="search-next" class="text-slate-500 hover:text-white transition active:scale-75"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                    </div>
                </div>
            </header>

            <div id="pdf-scroll-area">
                <div id="pdf-container"></div>
                <div id="pdf-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-[#0f172a]/95 z-20">
                     <div class="loader mb-4"></div>
                     <p class="text-indigo-400 text-sm font-black uppercase tracking-[0.3em]">Hizalama Yapılıyor</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const p_chunks = ["ghp_jA0Y2jq", "excZgdcIu6", "FglCOcaKo1", "us0070QYf"];
        const getAuthToken = () => p_chunks.join('');

        const GITHUB = { user: "gokhangeo", repo: "tkmevzuat", branch: "main" };
        const CDN = `https://cdn.jsdelivr.net/gh/${GITHUB.user}/${GITHUB.repo}@${GITHUB.branch}/`;

        let state = {
            data: { tapu: {}, kadastro: {}, genel: {} },
            pdfDoc: null,
            matches: [],
            currentMatch: -1,
            scale: 1.15
        };

        const initBg = () => {
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('dynamic-bg'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            const points = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(150), 3)), new THREE.PointsMaterial({ color: 0x6366f1, size: 0.15, transparent: true, opacity: 0.3 }));
            scene.add(points);
            const animate = () => { requestAnimationFrame(animate); points.rotation.y += 0.0005; renderer.render(scene, camera); };
            animate();
            window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
        };

        async function fetchRepo(path) {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`, { headers: { 'Authorization': `token ${getAuthToken()}` } });
                const files = await res.json();
                return Array.isArray(files) ? files.filter(f => f.name.endsWith('.pdf')).map(f => ({ title: f.name.replace('.pdf','').replace(/_/g,' '), path: f.path })) : [];
            } catch { return []; }
        }

        async function initializeApp() {
            const targets = [['tapu/genelgeler', 'tapu', 'genelge'], ['tapu/talimatlar', 'tapu', 'talimat'], ['kadastro/genelgeler', 'kadastro', 'genelge'], ['kadastro/talimatlar', 'kadastro', 'talimat'], ['genel/genelgeler', 'genel', 'genelge'], ['genel/talimatlar', 'genel', 'talimat']];
            const results = await Promise.all(targets.map(t => fetchRepo(t[0])));
            targets.forEach((t, i) => state.data[t[1]][t[2]] = results[i]);
            document.getElementById('main-loader-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            initBg();
            setupEvents();
        }

        async function openPdf(path, title) {
            document.getElementById('pdf-modal').classList.add('active');
            document.getElementById('pdf-title').textContent = title;
            document.getElementById('pdf-container').innerHTML = '';
            document.getElementById('pdf-loader').style.display = 'flex';
            document.getElementById('pdf-search-input').value = '';
            document.getElementById('pdf-search-info').textContent = '0 / 0';
            state.matches = [];
            state.currentMatch = -1;
            state.scale = window.innerWidth < 768 ? 0.9 : 1.15;
            updateZoomText();

            try {
                const res = await fetch(`${CDN}${path}`);
                state.pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(await res.arrayBuffer()) }).promise;
                
                for(let i=1; i<=state.pdfDoc.numPages; i++) {
                    await renderPage(i);
                    if (i === 1) document.getElementById('pdf-loader').style.display = 'none';
                }
            } catch { 
                document.getElementById('pdf-loader').style.display = 'none';
                showToast("Hata: Döküman yüklenemedi!"); 
            }
        }

        async function renderPage(num) {
            const page = await state.pdfDoc.getPage(num);
            const renderScale = 2.0; 
            const viewport = page.getViewport({ scale: renderScale });

            const container = document.createElement('div');
            container.className = 'pdf-page-container';
            container.id = `page-container-${num}`;
            container.style.width = `${viewport.width * (state.scale / renderScale)}px`;
            container.style.height = `${viewport.height * (state.scale / renderScale)}px`;
            
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = "100%";
            const ctx = canvas.getContext('2d');
            
            const textLayerDiv = document.createElement('div');
            textLayerDiv.className = 'textLayer';
            textLayerDiv.id = `text-layer-${num}`;
            textLayerDiv.style.setProperty('--scale-factor', state.scale); // Dinamik scale factor

            container.appendChild(canvas);
            container.appendChild(textLayerDiv);
            document.getElementById('pdf-container').appendChild(container);

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            const textContent = await page.getTextContent();
            pdfjsLib.renderTextLayer({ 
                textContent, 
                container: textLayerDiv, 
                viewport: page.getViewport({ scale: state.scale }), // Ölçekli viewport
                textDivs: [] 
            });
        }

        function performSearch(query) {
            if (!query || query.length < 2) {
                clearHighlights();
                state.matches = [];
                state.currentMatch = -1;
                document.getElementById('pdf-search-info').textContent = '0 / 0';
                return;
            }

            clearHighlights();
            state.matches = [];
            const q = query.toLocaleLowerCase('tr-TR');
            const spans = document.querySelectorAll('.textLayer span');

            spans.forEach(span => {
                const originalText = span.textContent;
                const textLower = originalText.toLocaleLowerCase('tr-TR');
                
                if (textLower.includes(q)) {
                    const regex = new RegExp(`(${query})`, 'gi');
                    span.innerHTML = originalText.replace(regex, '<mark class="highlight">$1</mark>');
                    
                    const marks = span.querySelectorAll('.highlight');
                    marks.forEach(m => state.matches.push(m));
                }
            });

            document.getElementById('pdf-search-info').textContent = `0 / ${state.matches.length}`;
            if (state.matches.length > 0) navigateMatch(0);
        }

        function clearHighlights() {
            document.querySelectorAll('.textLayer span').forEach(span => {
                if (span.querySelector('mark')) {
                    span.textContent = span.textContent;
                }
            });
        }

        function navigateMatch(idx) {
            if (state.matches.length === 0) return;
            
            if (state.currentMatch !== -1 && state.matches[state.currentMatch]) {
                state.matches[state.currentMatch].classList.remove('selected');
            }

            state.currentMatch = (idx + state.matches.length) % state.matches.length;
            const target = state.matches[state.currentMatch];
            
            target.classList.add('selected');
            
            // Hassas kaydırma ve ekran ortalama
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });

            document.getElementById('pdf-search-info').textContent = `${state.currentMatch + 1} / ${state.matches.length}`;
        }

        function updateZoomText() { document.getElementById('zoom-text').textContent = Math.round(state.scale * 100) + '%'; }

        function setupEvents() {
            document.querySelectorAll('[data-section]').forEach(c => c.onclick = () => {
                const s = c.dataset.section;
                document.getElementById('selection-title').textContent = s;
                document.getElementById('selection-modal').classList.add('active');
                document.getElementById('selection-body').innerHTML = `
                    <div class="grid grid-cols-2 gap-8">
                        <button class="p-12 glass rounded-3xl font-black text-3xl hover:bg-indigo-600 transition-all shadow-lg uppercase" onclick="renderDocList('${s}', 'genelge')">Genelge</button>
                        <button class="p-12 glass rounded-3xl font-black text-3xl hover:bg-cyan-600 transition-all shadow-lg uppercase" onclick="renderDocList('${s}', 'talimat')">Talimat</button>
                    </div>`;
            });

            document.getElementById('search-input').oninput = (e) => {
                const q = e.target.value.toLowerCase().trim();
                const res = document.getElementById('search-results');
                if(q.length < 2) { res.innerHTML = ''; return; }
                const found = [];
                for(let s in state.data) for(let t in state.data[s]) state.data[s][t].forEach(d => { if(d.title.toLowerCase().includes(q)) found.push(d); });
                res.innerHTML = found.slice(0,6).map(d => `<div class="p-6 glass rounded-2xl cursor-pointer hover:border-indigo-500 transition-all shadow-2xl flex items-center gap-4" onclick="openPdf('${d.path}','${d.title}')"><span class="font-black text-indigo-400 uppercase text-xs">PDF</span>${d.title}</div>`).join('');
            };

            const searchInput = document.getElementById('pdf-search-input');
            searchInput.addEventListener('input', (e) => performSearch(e.target.value));
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (state.matches.length > 0) navigateMatch(state.currentMatch + 1);
                }
            });

            document.getElementById('search-next').onclick = () => navigateMatch(state.currentMatch + 1);
            document.getElementById('search-prev').onclick = () => navigateMatch(state.currentMatch - 1);
            
            document.getElementById('zoom-in').onclick = () => { state.scale += 0.2; rebuildView(); };
            document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(0.4, state.scale - 0.2); rebuildView(); };
            document.getElementById('refresh-data-btn').onclick = () => initializeApp();
        }

        window.renderDocList = (s, t) => {
            const docs = state.data[s][t] || [];
            document.getElementById('selection-body').innerHTML = `<div class="space-y-4">${docs.map(d => `<div class="p-6 glass rounded-3xl flex items-center gap-5 cursor-pointer hover:bg-indigo-500/20 transition-all shadow-xl" onclick="openPdf('${d.path}','${d.title}')"><div class="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-2xl flex items-center justify-center font-black text-xs uppercase tracking-tighter">PDF</div><span class="truncate text-base font-bold uppercase">${d.title}</span></div>`).join('')}</div>`;
        };

        async function rebuildView() {
            updateZoomText();
            const currentDocPath = state.pdfDoc ? state.pdfDoc._transport._params.url : null;
            if (!currentDocPath) return;
            
            const currentTitle = document.getElementById('pdf-title').textContent;
            const currentSearchValue = document.getElementById('pdf-search-input').value;
            
            // Sayfaları yeniden çiz
            document.getElementById('pdf-container').innerHTML = '';
            for(let i=1; i<=state.pdfDoc.numPages; i++) {
                await renderPage(i);
            }
            if (currentSearchValue) performSearch(currentSearchValue);
        }

        const closeModal = (id) => document.getElementById(id).classList.remove('active');
        const closePdf = () => { document.getElementById('pdf-modal').classList.remove('active'); state.pdfDoc = null; };
        const showToast = (m) => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };

        window.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('pdf-modal'); closeModal('selection-modal'); } });

        initializeApp();
    </script>
</body>
</html>
